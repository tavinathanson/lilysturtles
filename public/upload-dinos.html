<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Upload — Dinosaurs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #5a3e1b 0%, #8B6914 50%, #a07a28 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    h1 {
      text-align: center;
      color: #5a3e1b;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 18px;
      -webkit-appearance: none;
      appearance: none;
    }
    input[type="text"]:focus {
      outline: none;
      border-color: #8B6914;
    }
    input[type="file"] {
      display: none;
    }
    .photo-btn {
      display: block;
      width: 100%;
      padding: 14px;
      border: 2px dashed #8B6914;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 18px;
      background: #fdf6e3;
      color: #6d5210;
      text-align: center;
      cursor: pointer;
      font-weight: 600;
    }
    button {
      width: 100%;
      padding: 16px;
      background: #8B6914;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.2s;
    }
    button:active { background: #6d5210; }
    button:disabled {
      background: #999;
      cursor: not-allowed;
    }
    .message {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 15px;
      display: none;
    }
    .message.error {
      display: block;
      background: #ffe0e0;
      color: #c00;
    }
    .message.success {
      display: block;
      background: #e0ffe0;
      color: #060;
    }
    .message.hint {
      display: block;
      background: #fff3cd;
      color: #856404;
    }
    .control-panel { display: none; text-align: center; }
    .control-panel h2 {
      color: #5a3e1b;
      font-size: 22px;
      margin-bottom: 4px;
    }
    .control-panel .success-msg {
      color: #060;
      background: #e0ffe0;
      border-radius: 10px;
      padding: 10px;
      font-size: 15px;
      margin-bottom: 20px;
    }
    .action-btn {
      width: 100%;
      padding: 18px 16px;
      margin-bottom: 12px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      transition: opacity 0.2s, transform 0.1s;
      color: white;
    }
    .action-btn:active:not(:disabled) { transform: scale(0.97); }
    .action-btn:disabled {
      background: #aaa !important;
      color: #ddd;
      cursor: not-allowed;
      transform: none !important;
    }
    .action-btn.closer  { background: #8B6914; }
    .action-btn.hat     { background: #d4609a; }
    .action-btn.spin    { background: #e08830; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dinosaurs</h1>
    <p class="subtitle">Add your dinosaur to the landscape!</p>
    <form id="uploadForm">
      <input type="hidden" name="mode" value="dino">

      <label for="name">Dinosaur Name</label>
      <input type="text" id="name" name="name" required maxlength="30" placeholder="What's your dinosaur called?">

      <label for="photo">Dinosaur Photo</label>
      <label for="photo" class="photo-btn" id="photoLabel">📷 Take Photo</label>
      <input type="file" id="photo" name="photo" accept="image/*" capture="environment" required>

      <label for="eventCode">Dino Code</label>
      <input type="text" id="eventCode" name="eventCode" required inputmode="numeric" pattern="\d*" placeholder="4-digit code" autocomplete="off">

      <button type="submit" id="submitBtn">Add My Dinosaur!</button>
    </form>
    <div class="message" id="message"></div>

    <div class="control-panel" id="controlPanel">
      <h2 id="dinoNameDisplay"></h2>
      <div class="success-msg">Your dinosaur is roaming the landscape!</div>
      <button class="action-btn closer" data-action="come_closer" data-cooldown="8">
        Come Closer
      </button>
      <button class="action-btn hat" data-action="party_hat" data-cooldown="5">
        Party Hat
      </button>
      <button class="action-btn spin" data-action="spin" data-cooldown="6">
        Do a Spin
      </button>
    </div>
  </div>

  <script>
    const form = document.getElementById('uploadForm');
    const msg = document.getElementById('message');
    const btn = document.getElementById('submitBtn');
    const controlPanel = document.getElementById('controlPanel');
    const dinoNameDisplay = document.getElementById('dinoNameDisplay');

    let dinoId = null;
    let savedEventCode = '';

    // Fetch title from config
    fetch('/api/config?mode=dinos').then(r => r.json()).then(cfg => {
      const t = cfg.title || 'Dinosaurs';
      document.title = 'Upload — ' + t;
      document.querySelector('h1').textContent = t;
    }).catch(() => {});

    // Restore saved event code
    const stored = localStorage.getItem('dinoCode');
    if (stored) document.getElementById('eventCode').value = stored;

    document.getElementById('photo').addEventListener('change', function() {
      const label = document.getElementById('photoLabel');
      label.textContent = this.files[0] ? '✅ ' + this.files[0].name : '📷 Take Photo';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.className = 'message';
      msg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Uploading...';

      const formData = new FormData(form);

      try {
        const res = await fetch('/api/upload', { method: 'POST', body: formData });
        const data = await res.json();

        if (!res.ok) {
          msg.className = 'message error';
          msg.textContent = data.error || 'Upload failed.';
          msg.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Add My Dinosaur!';
          return;
        }

        savedEventCode = document.getElementById('eventCode').value;
        localStorage.setItem('dinoCode', savedEventCode);
        dinoId = data.id;

        if (data.hint) {
          msg.className = 'message hint';
          msg.textContent = data.hint;
          msg.style.display = 'block';
        } else {
          msg.style.display = 'none';
        }

        form.style.display = 'none';
        dinoNameDisplay.textContent = data.name;
        controlPanel.style.display = 'block';
      } catch (err) {
        msg.className = 'message error';
        msg.textContent = 'Network error. Please try again.';
        msg.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Add My Dinosaur!';
      }
    });

    // Action buttons with cooldown
    for (const actionBtn of controlPanel.querySelectorAll('.action-btn')) {
      actionBtn.addEventListener('click', async () => {
        if (actionBtn.disabled || !dinoId) return;
        const action = actionBtn.dataset.action;
        const cooldown = parseInt(actionBtn.dataset.cooldown, 10) * 1000;

        const allBtns = controlPanel.querySelectorAll('.action-btn');
        const savedLabels = new Map();
        allBtns.forEach(b => {
          savedLabels.set(b, b.textContent.trim());
          b.disabled = true;
        });

        try {
          const res = await fetch(`/api/turtle/${dinoId}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, eventCode: savedEventCode }),
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            if (data.error === 'Not found.') {
              msg.className = 'message error';
              msg.textContent = 'Your dinosaur is no longer in the landscape.';
              msg.style.display = 'block';
            }
          }
        } catch {
          msg.className = 'message error';
          msg.textContent = 'Connection error. Try again!';
          msg.style.display = 'block';
        }

        const cooldownSec = cooldown / 1000;
        let remaining = cooldownSec;
        allBtns.forEach(b => b.textContent = `Wait ${remaining}s...`);
        const countdownId = setInterval(() => {
          remaining--;
          if (remaining > 0) {
            allBtns.forEach(b => b.textContent = `Wait ${remaining}s...`);
          }
        }, 1000);

        setTimeout(() => {
          clearInterval(countdownId);
          allBtns.forEach(b => {
            b.disabled = false;
            b.textContent = savedLabels.get(b);
          });
        }, cooldown);
      });
    }
  </script>
</body>
</html>
