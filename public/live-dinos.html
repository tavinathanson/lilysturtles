<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dinosaurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a3a1a; }
    #container { width: 100%; height: 100%; }
    canvas { display: block; }

    #labels {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden;
    }
    #title-label {
      position: absolute;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      color: #ffe8a0;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.4);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .dino-label {
      position: absolute;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      white-space: nowrap;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.5s;
    }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30,50,20,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .code-box {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .code-box h1 { color: #5a3e1b; font-family: 'Nunito', sans-serif; font-size: 26px; margin-bottom: 12px; }
    .code-box p { color: #666; margin-bottom: 18px; font-size: 15px; }
    .code-box input {
      width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px;
      font-size: 20px; text-align: center; margin-bottom: 14px; letter-spacing: 4px;
      -webkit-appearance: none;
    }
    .code-box input:focus { outline: none; border-color: #8B6914; }
    .code-box button {
      width: 100%; padding: 14px; background: #8B6914; color: white;
      border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer;
    }
    .code-box button:active { background: #6d5210; }
    .error { color: #c00; font-size: 14px; margin-top: 10px; min-height: 20px; }
  </style>
</head>
<body>
  <div id="container"></div>
  <div id="labels"><div id="title-label">Dinosaurs</div></div>

  <div id="overlay">
    <div class="code-box">
      <h1>Dinosaurs</h1>
      <p>Enter the Dino Code</p>
      <input type="text" id="codeInput" inputmode="numeric" pattern="\d*" maxlength="10" autocomplete="off">
      <button id="codeSubmit">Enter</button>
      <div class="error" id="codeError"></div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- DOM ---
    const container = document.getElementById('container');
    const labelsDiv = document.getElementById('labels');
    const titleLabel = document.getElementById('title-label');
    const overlay = document.getElementById('overlay');
    const codeInput = document.getElementById('codeInput');
    const codeSubmit = document.getElementById('codeSubmit');
    const codeError = document.getElementById('codeError');

    // --- Fetch config title ---
    fetch('/api/config?mode=dinos').then(r => r.json()).then(cfg => {
      const t = cfg.title || 'Dinosaurs';
      document.title = t;
      titleLabel.textContent = t;
      document.querySelector('.code-box h1').textContent = t;
    }).catch(() => {});

    // --- State ---
    let eventCode = '';
    const dinoMap = new Map();
    let landscapeRunning = false;
    let pollTimer = null;
    const processedCommands = new Set();
    let titleOpacity = 0;
    let startTime = 0;

    // --- Arena ---
    const ARENA = { xMin: -13, xMax: 13, zMin: -7, zMax: 16 };
    const GROUND_Y = -6;

    // --- Scene ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87CEEB);
    // Sky gradient via fog
    scene.fog = new THREE.FogExp2(0x9DC4E8, 0.012);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 2, ARENA.zMax + 6);
    camera.lookAt(0, -1, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // --- Lighting (warm, sunny) ---
    const ambientLight = new THREE.AmbientLight(0xfff5e0, 0.7);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(5, 15, 8);
    scene.add(sunLight);

    const warmFill = new THREE.DirectionalLight(0xffcc66, 0.4);
    warmFill.position.set(-4, 8, -2);
    scene.add(warmFill);

    // --- Shared materials ---
    const woodMat = new THREE.MeshStandardMaterial({
      color: 0xC4A06A, roughness: 0.85, metalness: 0
    });

    // ===================================================================
    // DINOSAUR SILHOUETTE PATHS
    // ===================================================================
    // Each path is defined facing right, normalized roughly to a bounding box.
    // Actual size is controlled by scale factor per species.

    // Body shapes are everything from hip-level up (no legs).
    // Legs are separate shapes that get their own meshes for animation.

    function makeTrexBody() {
      const s = new THREE.Shape();
      // Massive T-Rex: huge head, powerful body, tiny arms, heavy tail
      // Start at left hip bottom, trace clockwise

      // Left hip
      s.moveTo(-0.5, 0);

      // Belly (smooth curve from hip to chest)
      s.quadraticCurveTo(-0.2, 0.15, 0.3, 0.2);
      s.quadraticCurveTo(0.7, 0.25, 0.9, 0.45);

      // Lower chest up to tiny arm
      s.bezierCurveTo(0.95, 0.6, 1.0, 0.75, 1.05, 0.85);

      // Tiny stubby arm (cute little bump)
      s.quadraticCurveTo(1.15, 0.88, 1.2, 0.95);
      s.quadraticCurveTo(1.22, 1.02, 1.15, 1.05);
      s.quadraticCurveTo(1.05, 1.08, 0.95, 1.1);

      // Upper chest flowing into neck
      s.bezierCurveTo(0.85, 1.25, 0.78, 1.5, 0.75, 1.75);

      // Neck front rising to throat
      s.bezierCurveTo(0.75, 2.0, 0.8, 2.2, 0.95, 2.35);

      // Throat to jaw hinge
      s.quadraticCurveTo(1.1, 2.38, 1.3, 2.35);

      // Lower jaw with teeth bumps
      s.quadraticCurveTo(1.5, 2.3, 1.65, 2.28);
      s.quadraticCurveTo(1.72, 2.32, 1.8, 2.28);
      s.quadraticCurveTo(1.88, 2.32, 1.95, 2.28);
      s.quadraticCurveTo(2.02, 2.32, 2.1, 2.3);

      // Chin rounding up to nose
      s.bezierCurveTo(2.25, 2.32, 2.4, 2.38, 2.48, 2.5);

      // Nose rounding over snout top
      s.bezierCurveTo(2.52, 2.62, 2.5, 2.75, 2.42, 2.85);

      // Forehead curving back
      s.bezierCurveTo(2.3, 2.98, 2.1, 3.08, 1.85, 3.14);

      // Crown of head
      s.bezierCurveTo(1.6, 3.18, 1.35, 3.16, 1.1, 3.05);

      // Back of skull down into neck
      s.bezierCurveTo(0.9, 2.9, 0.75, 2.7, 0.65, 2.45);

      // Neck back flowing down
      s.bezierCurveTo(0.55, 2.1, 0.45, 1.75, 0.35, 1.5);

      // Upper back
      s.bezierCurveTo(0.2, 1.35, 0.0, 1.2, -0.2, 1.12);

      // Mid back to lower back
      s.bezierCurveTo(-0.4, 1.05, -0.55, 1.0, -0.7, 0.95);

      // Tail base
      s.bezierCurveTo(-1.0, 0.9, -1.3, 0.9, -1.6, 0.95);

      // Tail mid (heavy, thick)
      s.bezierCurveTo(-2.0, 1.0, -2.4, 1.0, -2.65, 0.92);

      // Tail tip (tapering to rounded point)
      s.bezierCurveTo(-2.78, 0.88, -2.82, 0.82, -2.8, 0.75);

      // Tail underside tapering back
      s.bezierCurveTo(-2.78, 0.68, -2.6, 0.62, -2.4, 0.6);

      // Tail underside flowing back to hip
      s.bezierCurveTo(-2.0, 0.52, -1.5, 0.45, -1.1, 0.42);
      s.bezierCurveTo(-0.85, 0.4, -0.7, 0.35, -0.6, 0.25);

      // Back to left hip
      s.quadraticCurveTo(-0.55, 0.1, -0.5, 0);

      s.closePath();
      return s;
    }

    function makeTrexLeg() {
      const s = new THREE.Shape();
      // Thick muscular T-Rex leg with big clawed foot

      // Top left (hip joint)
      s.moveTo(-0.3, 0);

      // Outer thigh (powerful, bulging muscle)
      s.bezierCurveTo(-0.38, -0.15, -0.4, -0.35, -0.38, -0.55);

      // Outer thigh to knee
      s.bezierCurveTo(-0.35, -0.8, -0.3, -1.0, -0.25, -1.15);

      // Knee (slight bulge)
      s.bezierCurveTo(-0.22, -1.25, -0.2, -1.35, -0.18, -1.5);

      // Shin tapering down
      s.bezierCurveTo(-0.16, -1.65, -0.17, -1.8, -0.2, -1.95);

      // Ankle joint
      s.quadraticCurveTo(-0.24, -2.02, -0.3, -2.05);

      // Heel curving to foot bottom
      s.bezierCurveTo(-0.35, -2.1, -0.38, -2.18, -0.35, -2.22);

      // Foot bottom (big flat foot)
      s.quadraticCurveTo(-0.2, -2.25, 0.0, -2.25);
      s.quadraticCurveTo(0.15, -2.25, 0.3, -2.22);

      // Toe bumps (three chunky toes)
      s.quadraticCurveTo(0.35, -2.2, 0.38, -2.15);

      // Toe top curving back to ankle
      s.bezierCurveTo(0.35, -2.08, 0.25, -2.02, 0.15, -1.98);

      // Ankle front
      s.quadraticCurveTo(0.12, -1.9, 0.12, -1.8);

      // Shin front
      s.bezierCurveTo(0.13, -1.6, 0.15, -1.4, 0.18, -1.2);

      // Knee front
      s.bezierCurveTo(0.22, -1.0, 0.28, -0.8, 0.33, -0.55);

      // Inner thigh
      s.bezierCurveTo(0.36, -0.35, 0.35, -0.15, 0.3, 0);

      s.closePath();
      return s;
    }

    function makeTriceratopsBody() {
      const s = new THREE.Shape();
      // Triceratops: HUGE frill, prominent horns, stocky barrel body, short tail
      // The frill should dominate the silhouette - it's what makes it recognizable

      // Start at left hip bottom
      s.moveTo(-0.2, 0);

      // Barrel belly - short and round, not elongated
      s.bezierCurveTo(0.1, 0.05, 0.5, 0.08, 0.8, 0.1);

      // Chest curving up to throat
      s.bezierCurveTo(1.0, 0.12, 1.2, 0.18, 1.35, 0.3);

      // Throat up to lower jaw
      s.bezierCurveTo(1.45, 0.38, 1.55, 0.45, 1.65, 0.5);

      // Lower jaw - beak-like snout
      s.bezierCurveTo(1.8, 0.55, 1.95, 0.58, 2.05, 0.62);

      // Nose horn - short but visible spike up from snout
      s.lineTo(2.15, 0.68);
      s.lineTo(2.2, 0.9);  // horn tip
      s.lineTo(2.15, 0.78);

      // Snout top curving up to brow
      s.bezierCurveTo(2.2, 0.88, 2.22, 0.98, 2.2, 1.1);

      // RIGHT brow horn - long and dramatic, pointing up-right
      s.lineTo(2.25, 1.15);
      s.lineTo(2.55, 1.7);  // horn tip - high and far!
      s.lineTo(2.35, 1.35);  // back down

      // Brow ridge between horns
      s.bezierCurveTo(2.25, 1.3, 2.1, 1.32, 2.0, 1.35);

      // LEFT brow horn - also long, pointing up-left
      s.lineTo(1.95, 1.4);
      s.lineTo(1.7, 1.9);  // horn tip
      s.lineTo(1.8, 1.55);

      // Top of head into frill base
      s.bezierCurveTo(1.7, 1.5, 1.6, 1.52, 1.5, 1.6);

      // ===== FRILL - big, dramatic, scalloped =====
      // The frill fans out wide and tall behind the head

      // Frill right edge rising
      s.bezierCurveTo(1.45, 1.75, 1.42, 1.9, 1.4, 2.05);

      // Scallop 1 (right)
      s.quadraticCurveTo(1.42, 2.2, 1.35, 2.3);
      s.quadraticCurveTo(1.28, 2.38, 1.2, 2.32);

      // Scallop 2
      s.quadraticCurveTo(1.12, 2.42, 1.02, 2.45);
      s.quadraticCurveTo(0.92, 2.42, 0.85, 2.35);

      // Scallop 3 (center top - highest point)
      s.quadraticCurveTo(0.78, 2.45, 0.68, 2.48);
      s.quadraticCurveTo(0.58, 2.45, 0.5, 2.38);

      // Scallop 4
      s.quadraticCurveTo(0.42, 2.45, 0.32, 2.42);
      s.quadraticCurveTo(0.22, 2.38, 0.18, 2.28);

      // Scallop 5 (left)
      s.quadraticCurveTo(0.12, 2.35, 0.05, 2.25);
      s.quadraticCurveTo(-0.02, 2.15, -0.05, 2.0);

      // Frill left edge descending back to neck
      s.bezierCurveTo(-0.08, 1.8, -0.08, 1.6, -0.05, 1.45);

      // ===== END FRILL =====

      // Neck back into spine
      s.bezierCurveTo(-0.02, 1.3, 0.0, 1.15, -0.05, 1.0);

      // Rounded back - stocky
      s.bezierCurveTo(-0.15, 0.9, -0.3, 0.85, -0.5, 0.82);

      // Lower back to tail base
      s.bezierCurveTo(-0.7, 0.78, -0.85, 0.72, -1.0, 0.65);

      // Tail - medium, tapering smoothly
      s.bezierCurveTo(-1.3, 0.55, -1.6, 0.48, -1.85, 0.42);
      s.bezierCurveTo(-2.0, 0.38, -2.1, 0.32, -2.12, 0.25);

      // Tail tip rounded
      s.bezierCurveTo(-2.12, 0.2, -2.08, 0.16, -2.0, 0.15);

      // Tail underside
      s.bezierCurveTo(-1.8, 0.18, -1.5, 0.2, -1.2, 0.2);
      s.bezierCurveTo(-0.9, 0.18, -0.6, 0.12, -0.35, 0.05);

      // Back to start
      s.quadraticCurveTo(-0.28, 0.02, -0.2, 0);

      s.closePath();
      return s;
    }

    function makeTriceratopsLeg() {
      const s = new THREE.Shape();
      // Sturdy columnar Triceratops leg

      // Top left (hip joint)
      s.moveTo(-0.22, 0);

      // Outer thigh (sturdy, columnar)
      s.bezierCurveTo(-0.26, -0.15, -0.28, -0.35, -0.26, -0.55);

      // Mid thigh to knee
      s.bezierCurveTo(-0.24, -0.75, -0.22, -0.95, -0.2, -1.1);

      // Knee to ankle (slight taper)
      s.bezierCurveTo(-0.19, -1.25, -0.2, -1.35, -0.23, -1.42);

      // Ankle to heel
      s.quadraticCurveTo(-0.26, -1.48, -0.28, -1.52);

      // Foot bottom (wide, flat)
      s.bezierCurveTo(-0.28, -1.58, -0.22, -1.6, -0.1, -1.6);
      s.quadraticCurveTo(0.0, -1.6, 0.12, -1.58);
      s.bezierCurveTo(0.18, -1.56, 0.2, -1.52, 0.18, -1.48);

      // Foot top to ankle front
      s.quadraticCurveTo(0.15, -1.42, 0.12, -1.35);

      // Shin front
      s.bezierCurveTo(0.14, -1.15, 0.17, -0.95, 0.2, -0.75);

      // Inner thigh
      s.bezierCurveTo(0.23, -0.55, 0.25, -0.35, 0.24, -0.15);

      // Back to top
      s.quadraticCurveTo(0.23, -0.05, 0.22, 0);

      s.closePath();
      return s;
    }

    function makeStegosaurusBody() {
      const s = new THREE.Shape();
      // Stegosaurus: HIGH arched back, BIG WIDE diamond plates, spiked tail, small friendly head
      // The body should be tall and rounded, not flat like a sausage
      // Plates should be WIDE diamonds, not thin spikes

      // Start at left hip
      s.moveTo(-0.3, 0);

      // Belly - rounded, not flat. The body has real depth.
      s.bezierCurveTo(0.0, -0.1, 0.4, -0.15, 0.8, -0.12);
      s.bezierCurveTo(1.1, -0.08, 1.3, 0.0, 1.5, 0.05);

      // Chest sloping down to neck (head is LOW, below body level)
      s.bezierCurveTo(1.6, 0.02, 1.7, -0.05, 1.8, -0.15);

      // Neck curving down to small head
      s.bezierCurveTo(1.9, -0.25, 2.0, -0.32, 2.1, -0.35);

      // Small rounded friendly head
      s.bezierCurveTo(2.2, -0.38, 2.3, -0.35, 2.35, -0.28);
      s.bezierCurveTo(2.4, -0.22, 2.4, -0.15, 2.35, -0.08);
      s.bezierCurveTo(2.3, -0.02, 2.22, 0.02, 2.12, 0.04);

      // Top of head back into neck (neck goes UP to high back)
      s.bezierCurveTo(2.0, 0.06, 1.9, 0.08, 1.8, 0.12);
      s.bezierCurveTo(1.7, 0.18, 1.6, 0.28, 1.5, 0.4);

      // Neck rising steeply up to back ridge
      s.bezierCurveTo(1.4, 0.52, 1.35, 0.6, 1.3, 0.65);

      // ===== PLATES - wide diamond/kite shapes along the arched back =====
      // Each plate: go wide left, up to tip, wide right, back to ridge
      // The back arches HIGH - ridge goes from 0.65 up to ~0.85 at center, back down

      // Plate 1 (front, smallest)
      s.lineTo(1.22, 0.65);
      s.bezierCurveTo(1.15, 0.7, 1.1, 0.85, 1.15, 1.05);  // left edge up
      s.lineTo(1.2, 1.2);                                     // tip
      s.bezierCurveTo(1.25, 0.85, 1.3, 0.72, 1.28, 0.68);   // right edge down

      // Ridge between plates (arching up)
      s.bezierCurveTo(1.15, 0.7, 1.05, 0.72, 0.98, 0.73);

      // Plate 2 (medium)
      s.bezierCurveTo(0.9, 0.78, 0.82, 0.95, 0.85, 1.18);   // left edge
      s.lineTo(0.9, 1.42);                                     // tip
      s.bezierCurveTo(0.95, 1.0, 1.02, 0.82, 1.0, 0.76);    // right edge

      // Ridge (highest point of arch)
      s.bezierCurveTo(0.88, 0.78, 0.75, 0.8, 0.65, 0.8);

      // Plate 3 (center, BIGGEST)
      s.bezierCurveTo(0.55, 0.85, 0.45, 1.05, 0.5, 1.35);   // left edge
      s.lineTo(0.55, 1.65);                                    // tip - tallest!
      s.bezierCurveTo(0.62, 1.1, 0.7, 0.9, 0.68, 0.82);     // right edge

      // Ridge (still high)
      s.bezierCurveTo(0.55, 0.82, 0.42, 0.78, 0.32, 0.75);

      // Plate 4 (medium)
      s.bezierCurveTo(0.22, 0.8, 0.14, 0.95, 0.18, 1.15);   // left edge
      s.lineTo(0.22, 1.35);                                    // tip
      s.bezierCurveTo(0.28, 0.98, 0.35, 0.82, 0.35, 0.76);  // right edge

      // Ridge (descending toward tail)
      s.bezierCurveTo(0.22, 0.74, 0.1, 0.7, 0.0, 0.66);

      // Plate 5 (rear, smallest)
      s.bezierCurveTo(-0.08, 0.7, -0.15, 0.82, -0.12, 0.98);  // left edge
      s.lineTo(-0.08, 1.12);                                      // tip
      s.bezierCurveTo(-0.02, 0.85, 0.05, 0.72, 0.02, 0.66);   // right edge

      // ===== END PLATES =====

      // Back ridge flowing down into tail
      s.bezierCurveTo(-0.1, 0.62, -0.3, 0.58, -0.5, 0.55);

      // Tail base (thick, rising slightly for thagomizer)
      s.bezierCurveTo(-0.8, 0.52, -1.1, 0.52, -1.4, 0.55);
      s.bezierCurveTo(-1.6, 0.58, -1.75, 0.6, -1.85, 0.6);

      // ===== THAGOMIZER - 4 big spikes =====
      // Spike 1 (upper, angled back-up)
      s.lineTo(-1.9, 0.62);
      s.lineTo(-2.15, 1.0);   // spike tip
      s.lineTo(-1.98, 0.65);

      // Spike 2 (upper-forward, angled up-forward)
      s.lineTo(-2.05, 0.63);
      s.lineTo(-2.4, 0.95);   // spike tip
      s.lineTo(-2.15, 0.58);

      // Tail end
      s.bezierCurveTo(-2.25, 0.5, -2.3, 0.42, -2.3, 0.35);

      // Spike 3 (lower-forward)
      s.lineTo(-2.4, 0.1);    // spike tip
      s.lineTo(-2.2, 0.3);

      // Spike 4 (lower-back)
      s.lineTo(-2.15, 0.05);  // spike tip
      s.lineTo(-2.0, 0.28);

      // ===== END THAGOMIZER =====

      // Tail underside flowing back to body
      s.bezierCurveTo(-1.8, 0.25, -1.5, 0.2, -1.2, 0.18);
      s.bezierCurveTo(-0.9, 0.15, -0.6, 0.08, -0.4, 0.03);

      // Back to left hip
      s.quadraticCurveTo(-0.35, 0.01, -0.3, 0);

      s.closePath();
      return s;
    }

    function makeStegosaurusLeg() {
      const s = new THREE.Shape();
      // Short stumpy Stegosaurus leg

      // Top left (hip joint)
      s.moveTo(-0.2, 0);

      // Outer thigh (chunky)
      s.bezierCurveTo(-0.24, -0.12, -0.26, -0.3, -0.24, -0.5);

      // Knee area

    // ===================================================================
    // CUSTOM UV GENERATOR for ExtrudeGeometry
    // ===================================================================
    // Maps shape coords to 0-1 UV range based on bounding box
    function makeUVGenerator(shape) {
      const pts = shape.getPoints();
      let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      for (const p of pts) {
        if (p.x < minX) minX = p.x;
        if (p.x > maxX) maxX = p.x;
        if (p.y < minY) minY = p.y;
        if (p.y > maxY) maxY = p.y;
      }
      const rangeX = maxX - minX || 1;
      const rangeY = maxY - minY || 1;

      return {
        generateTopUV(geometry, vertices, indexA, indexB, indexC) {
          const ax = vertices[indexA * 3], ay = vertices[indexA * 3 + 1];
          const bx = vertices[indexB * 3], by = vertices[indexB * 3 + 1];
          const cx = vertices[indexC * 3], cy = vertices[indexC * 3 + 1];
          return [
            new THREE.Vector2((ax - minX) / rangeX, (ay - minY) / rangeY),
            new THREE.Vector2((bx - minX) / rangeX, (by - minY) / rangeY),
            new THREE.Vector2((cx - minX) / rangeX, (cy - minY) / rangeY),
          ];
        },
        generateSideWallUV(geometry, vertices, indexA, indexB, indexC, indexD) {
          return [
            new THREE.Vector2(0, 0),
            new THREE.Vector2(1, 0),
            new THREE.Vector2(1, 1),
            new THREE.Vector2(0, 1),
          ];
        }
      };
    }

    // ===================================================================
    // TEXTURE LOADING
    // ===================================================================
    function loadDinoTexture(dataURI) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const w = img.width, h = img.height;
          const canvas = document.createElement('canvas');
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);

          // Contrast boost (same S-curve as turtles)
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          for (let i = 0; i < d.length; i += 4) {
            if (d[i + 3] < 10) continue;
            for (let c = 0; c < 3; c++) {
              let v = d[i + c] / 255;
              v = v < 0.5
                ? 0.5 * Math.pow(2 * v, 2.8)
                : 1 - 0.5 * Math.pow(2 * (1 - v), 2.8);
              d[i + c] = Math.round(v * 255);
            }
          }
          ctx.putImageData(imgData, 0, 0);

          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          resolve(tex);
        };
        img.src = dataURI;
      });
    }

    // ===================================================================
    // CREATE DINO 3D (wooden cutout)
    // ===================================================================
    async function createDino3D(serverData) {
      const species = serverData.species || 'trex';
      const config = DINO_CONFIGS[species] || DINO_CONFIGS.trex;
      const scale = DINO_SCALES[species] || 1.0;

      // Build materials
      let frontBackMat;
      if (serverData.imageData) {
        const tex = await loadDinoTexture(serverData.imageData);
        frontBackMat = new THREE.MeshStandardMaterial({
          map: tex,
          roughness: 0.6,
          metalness: 0,
          side: THREE.DoubleSide,
        });
      } else {
        frontBackMat = new THREE.MeshStandardMaterial({
          color: 0x8BAA38,
          roughness: 0.6,
        });
      }

      // Leg material (same color but no texture - keeps it simple)
      const legMat = new THREE.MeshStandardMaterial({
        color: frontBackMat.color || new THREE.Color(0x8BAA38),
        roughness: 0.6,
        metalness: 0,
      });
      if (serverData.imageData) {
        // Tint legs to match body
        legMat.color.set(0x6a8a28);
      }

      // --- Body mesh ---
      const bodyShape = config.body;
      const bodyGeo = new THREE.ExtrudeGeometry(bodyShape, {
        depth: 0.35,
        bevelEnabled: false,
        UVGenerator: makeUVGenerator(bodyShape),
      });
      const bodyMesh = new THREE.Mesh(bodyGeo, [frontBackMat, woodMat]);
      bodyGeo.computeBoundingBox();
      const bbb = bodyGeo.boundingBox;
      const bcx = (bbb.min.x + bbb.max.x) / 2;
      const bcz = (bbb.min.z + bbb.max.z) / 2;
      bodyMesh.geometry.translate(-bcx, 0, -bcz);

      // --- Leg meshes (2 pairs: front-left/back-right and front-right/back-left for walk cycle) ---
      const legShape = config.leg;
      const legGeo = new THREE.ExtrudeGeometry(legShape, {
        depth: 0.25,
        bevelEnabled: false,
      });

      // Create leg pivot groups (pivot at hip)
      function makeLegPivot(hipX) {
        const pivot = new THREE.Group();
        const legMesh = new THREE.Mesh(legGeo, [legMat, woodMat]);
        // Position leg so pivot point is at top of leg
        pivot.add(legMesh);
        pivot.position.set(hipX - bcx, 0, 0);
        return pivot;
      }

      const leftLegPivot = makeLegPivot(config.hipLeft.x);
      const rightLegPivot = makeLegPivot(config.hipRight.x);

      // --- 3D eyes (on both sides of head) ---
      const eyeWhiteMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.3 });
      const pupilMat = new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.2 });
      const eyeHighlightMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.3 });

      // Eye positions relative to body shape (species-specific)
      const eyeConfigs = {
        trex: { x: 1.5, y: 2.85, size: 0.18 },
        triceratops: { x: 1.8, y: 1.05, size: 0.12 },
        stegosaurus: { x: 2.1, y: 0.15, size: 0.10 },
        brachiosaurus: { x: 1.3, y: 4.2, size: 0.14 },
      };
      const eyeCfg = eyeConfigs[species] || eyeConfigs.trex;

      // Front-side eye
      const eyeWhite1 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size, 8, 8), eyeWhiteMat);
      eyeWhite1.position.set(eyeCfg.x - bcx, eyeCfg.y, 0.2);
      bodyMesh.add(eyeWhite1);
      const pupil1 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size * 0.55, 6, 6), pupilMat);
      pupil1.position.set(0, 0, eyeCfg.size * 0.6);
      eyeWhite1.add(pupil1);
      const highlight1 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size * 0.25, 4, 4), eyeHighlightMat);
      highlight1.position.set(eyeCfg.size * 0.2, eyeCfg.size * 0.2, eyeCfg.size * 0.85);
      eyeWhite1.add(highlight1);

      // Back-side eye
      const eyeWhite2 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size, 8, 8), eyeWhiteMat);
      eyeWhite2.position.set(eyeCfg.x - bcx, eyeCfg.y, -0.15);
      bodyMesh.add(eyeWhite2);
      const pupil2 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size * 0.55, 6, 6), pupilMat);
      pupil2.position.set(0, 0, -eyeCfg.size * 0.6);
      eyeWhite2.add(pupil2);
      const highlight2 = new THREE.Mesh(new THREE.SphereGeometry(eyeCfg.size * 0.25, 4, 4), eyeHighlightMat);
      highlight2.position.set(eyeCfg.size * 0.2, eyeCfg.size * 0.2, -eyeCfg.size * 0.85);
      eyeWhite2.add(highlight2);

      // --- Assemble group ---
      // Body sits above legs; legs hang from hip level
      const bodyGroup = new THREE.Group();
      bodyGroup.add(bodyMesh);
      bodyGroup.position.y = config.legLength;

      const group = new THREE.Group();
      group.add(bodyGroup);

      // Position leg pivots at hip height
      leftLegPivot.position.y = config.legLength;
      rightLegPivot.position.y = config.legLength;
      group.add(leftLegPivot);
      group.add(rightLegPivot);

      group.scale.setScalar(scale);

      // Shadow
      const shadowGeo = new THREE.CircleGeometry(1.2, 16);
      const shadowMat2 = new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.2, depthWrite: false
      });
      const shadow = new THREE.Mesh(shadowGeo, shadowMat2);
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.y = -0.01 / scale;
      group.add(shadow);

      scene.add(group);

      // Compute total height for labels
      const totalHeight = (bbb.max.y + config.legLength) * scale;

      group.position.set(
        ARENA.xMin + Math.random() * (ARENA.xMax - ARENA.xMin),
        GROUND_Y,
        ARENA.zMin + Math.random() * (ARENA.zMax - ARENA.zMin)
      );

      const entry = {
        id: serverData.id,
        name: serverData.name,
        species,
        group,
        mesh: bodyMesh,
        shadow,
        material: frontBackMat,
        height: totalHeight,
        heading: Math.random() * Math.PI * 2,
        targetHeading: Math.random() * Math.PI * 2,
        smoothHeading: Math.random() * Math.PI * 2,
        speed: (serverData.speed || 60) / 300 * (DINO_SPEEDS[species] || 1),
        wanderTimer: Math.random() * 5,
        walkPhase: Math.random() * Math.PI * 2,
        leftLeg: leftLegPivot,
        rightLeg: rightLegPivot,
        bodyGroup,
        boostTimer: 0,
        boostTarget: null,
        spinRemaining: 0,
        partyHat: null,
        partyHatTimer: 0,
        label: null,
        labelCreatedAt: performance.now(),
        isHero: serverData.isHero || false,
      };

      if (!serverData.isHero) {
        const lbl = document.createElement('div');
        lbl.className = 'dino-label';
        lbl.textContent = serverData.name;
        labelsDiv.appendChild(lbl);
        entry.label = lbl;
      }

      return entry;
    }

    // ===================================================================
    // MOVEMENT SYSTEM
    // ===================================================================
    function updateDinoMovement(entry, dt, time) {
      const { group } = entry;
      const speedMult = entry.boostTimer > 0 ? 3.0 : 1.0;

      // --- Spin ---
      if (entry.spinRemaining > 0) {
        const spinSpeed = Math.PI * 3;
        entry.heading += spinSpeed * dt;
        entry.spinRemaining -= spinSpeed * dt;
        if (entry.spinRemaining <= 0) entry.spinRemaining = 0;
      }

      // --- Come closer ---
      if (entry.boostTimer > 0) {
        entry.boostTimer -= dt;
        const tx = entry.boostTarget.x;
        const tz = entry.boostTarget.z;
        const dx = tx - group.position.x;
        const dz = tz - group.position.z;
        const dist = Math.sqrt(dx * dx + dz * dz);
        if (dist > 0.5) {
          entry.targetHeading = Math.atan2(dx, dz);
        }
      }

      // --- Wander ---
      entry.wanderTimer -= dt;
      if (entry.wanderTimer <= 0) {
        entry.targetHeading += (Math.random() - 0.5) * 1.5;
        entry.wanderTimer = 4 + Math.random() * 4;
      }

      // --- Wall avoidance (strong, with hard clamp) ---
      const margin = 3;
      const px = group.position.x;
      const pz = group.position.z;
      let steerX = 0, steerZ = 0;
      let wallUrgency = 0;
      if (px < ARENA.xMin + margin) { const f = 1 - (px - ARENA.xMin) / margin; steerX += f; wallUrgency = Math.max(wallUrgency, f); }
      if (px > ARENA.xMax - margin) { const f = 1 - (ARENA.xMax - px) / margin; steerX -= f; wallUrgency = Math.max(wallUrgency, f); }
      if (pz < ARENA.zMin + margin) { const f = 1 - (pz - ARENA.zMin) / margin; steerZ += f; wallUrgency = Math.max(wallUrgency, f); }
      if (pz > ARENA.zMax - margin) { const f = 1 - (ARENA.zMax - pz) / margin; steerZ -= f; wallUrgency = Math.max(wallUrgency, f); }
      if (steerX || steerZ) {
        entry.targetHeading = Math.atan2(steerX, steerZ);
      }
      // Hard clamp: don't let dinos leave the arena
      group.position.x = Math.max(ARENA.xMin, Math.min(ARENA.xMax, group.position.x));
      group.position.z = Math.max(ARENA.zMin, Math.min(ARENA.zMax, group.position.z));

      // --- Smooth heading (faster turning near walls) ---
      const turnRate = 2 + wallUrgency * 8;
      let diff = entry.targetHeading - entry.smoothHeading;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      entry.smoothHeading += diff * Math.min(1, dt * turnRate);

      let diff2 = entry.smoothHeading - entry.heading;
      while (diff2 > Math.PI) diff2 -= Math.PI * 2;
      while (diff2 < -Math.PI) diff2 += Math.PI * 2;
      if (entry.spinRemaining <= 0) {
        entry.heading += diff2 * Math.min(1, dt * (turnRate + 1));
      }

      // --- Move forward ---
      const moveSpeed = entry.speed * speedMult;
      group.position.x += Math.sin(entry.heading) * moveSpeed * dt;
      group.position.z += Math.cos(entry.heading) * moveSpeed * dt;

      // Keep on ground
      group.position.y = GROUND_Y;

      // --- Apply rotation ---
      group.rotation.y = entry.heading;

      // --- Walking animation: swing legs back and forth ---
      const walkRate = 3 + moveSpeed * 8;
      entry.walkPhase += dt * walkRate;

      const legSwing = Math.sin(entry.walkPhase) * 0.5;  // leg swing angle (radians)
      if (entry.leftLeg) entry.leftLeg.rotation.z = legSwing;
      if (entry.rightLeg) entry.rightLeg.rotation.z = -legSwing;

      // Gentle body bob (subtle, not the main motion)
      const bob = Math.abs(Math.sin(entry.walkPhase * 2)) * 0.06;
      group.position.y = GROUND_Y + bob;

      // --- Party hat timer ---
      if (entry.partyHat && entry.partyHatTimer > 0) {
        entry.partyHatTimer -= dt;
        if (entry.partyHatTimer <= 0) {
          entry.group.remove(entry.partyHat);
          entry.partyHat = null;
        }
      }
    }

    // ENVIRONMENT
    // ===================================================================

    // --- Ground plane ---
    function buildGround() {
      const gw = 512, gh = 256;
      const canvas = document.createElement('canvas');
      canvas.width = gw; canvas.height = gh;
      const ctx = canvas.getContext('2d');

      // Gradient: green near camera → brown far
      const grad = ctx.createLinearGradient(0, 0, 0, gh);
      grad.addColorStop(0, '#8B7355');  // far (brown/dirt)
      grad.addColorStop(0.5, '#6B8E23'); // mid (olive)
      grad.addColorStop(1, '#4a7a2e');  // near (green)
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, gw, gh);

      // Grass speckle
      for (let i = 0; i < 800; i++) {
        const x = Math.random() * gw;
        const y = Math.random() * gh;
        const green = 80 + Math.random() * 80;
        ctx.fillStyle = `rgba(${30 + Math.random() * 40},${green},${20 + Math.random() * 30},0.4)`;
        ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 3);
      }

      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.MeshStandardMaterial({
        map: tex, roughness: 0.95, metalness: 0,
      });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(50, 35), mat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(0, GROUND_Y - 0.05, 5);
      scene.add(plane);
    }
    buildGround();

    // --- Rocks ---
    function addRocks() {
      const rockMat = new THREE.MeshStandardMaterial({ color: 0x888080, roughness: 0.9 });
      const positions = [
        [-8, 0.3, 3], [10, 0.25, -2], [-5, 0.35, 10], [7, 0.2, 8],
        [2, 0.3, -4], [-10, 0.25, 7], [11, 0.3, 12],
      ];
      for (const [x, s, z] of positions) {
        const rock = new THREE.Mesh(
          new THREE.SphereGeometry(s + Math.random() * 0.3, 6, 5),
          rockMat
        );
        rock.position.set(x, GROUND_Y + s * 0.3, z);
        rock.scale.set(1 + Math.random() * 0.5, 0.5 + Math.random() * 0.5, 1 + Math.random() * 0.5);
        scene.add(rock);
      }
    }
    addRocks();

    // --- Trees ---
    function createTree(x, z, height, canopyType) {
      const tree = new THREE.Group();
      // Trunk
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.25, height, 6),
        new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.9 })
      );
      trunk.position.y = height / 2;
      tree.add(trunk);

      if (canopyType === 'pine') {
        // Pine tree — stacked cones
        for (let i = 0; i < 3; i++) {
          const cone = new THREE.Mesh(
            new THREE.ConeGeometry(1.2 - i * 0.3, 1.5 - i * 0.2, 7),
            new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.8 })
          );
          cone.position.y = height * 0.6 + i * 0.8;
          tree.add(cone);
        }
      } else {
        // Round canopy
        const canopy = new THREE.Mesh(
          new THREE.SphereGeometry(1.0 + Math.random() * 0.5, 7, 6),
          new THREE.MeshStandardMaterial({ color: 0x3a7a20, roughness: 0.8 })
        );
        canopy.position.y = height + 0.5;
        canopy.scale.y = 0.75;
        tree.add(canopy);
      }

      tree.position.set(x, GROUND_Y, z);
      scene.add(tree);
    }

    // Place trees around edges (not blocking center view)
    createTree(-11, 2, 3.0, 'pine');
    createTree(-9, -4, 2.5, 'round');
    createTree(11, 0, 2.8, 'pine');
    createTree(9, -5, 3.2, 'round');
    createTree(-7, 13, 2.5, 'pine');
    createTree(8, 14, 2.8, 'round');
    createTree(-12, 8, 3.5, 'pine');
    createTree(12, 6, 2.0, 'round');

    // --- Volcano ---
    function buildVolcano() {
      const volcGroup = new THREE.Group();

      // Dark rocky material
      const rockMat2 = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.95 });
      const darkRockMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.95 });

      // Main cone - truncated (open top = crater)
      const cone = new THREE.Mesh(
        new THREE.CylinderGeometry(1.8, 7, 12, 16, 1, true),
        rockMat2
      );
      cone.position.y = 6;
      volcGroup.add(cone);

      // Base skirt (wider, gives it a natural slope)
      const base = new THREE.Mesh(
        new THREE.CylinderGeometry(7, 9, 2, 16, 1, true),
        new THREE.MeshStandardMaterial({ color: 0x4a3a2a, roughness: 0.95 })
      );
      base.position.y = 1;
      volcGroup.add(base);

      // Crater rim (ring at top)
      const rim = new THREE.Mesh(
        new THREE.TorusGeometry(2.0, 0.5, 8, 16),
        darkRockMat
      );
      rim.rotation.x = Math.PI / 2;
      rim.position.y = 12;
      volcGroup.add(rim);

      // Crater interior (dark cylinder inside)
      const craterInner = new THREE.Mesh(
        new THREE.CylinderGeometry(1.8, 1.5, 2, 12),
        darkRockMat
      );
      craterInner.position.y = 11;
      volcGroup.add(craterInner);

      // Lava pool (glowing disc inside crater)
      const lavaPool = new THREE.Mesh(
        new THREE.CircleGeometry(1.5, 12),
        new THREE.MeshStandardMaterial({
          color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 3.0,
        })
      );
      lavaPool.rotation.x = -Math.PI / 2;
      lavaPool.position.y = 10.2;
      volcGroup.add(lavaPool);

      // Lava flows down the sides (3D tube geometry)
      const lavaMat = new THREE.MeshStandardMaterial({
        color: 0xff4400, emissive: 0xff3300, emissiveIntensity: 2.0,
        roughness: 0.4,
      });
      for (let i = 0; i < 4; i++) {
        const angle = (i / 4) * Math.PI * 2 + 0.3;
        const points = [];
        const topR = 1.8;
        for (let t = 0; t <= 1; t += 0.1) {
          const r = topR + t * (7 - topR) * 1.1;
          const y = 12 - t * 10;
          const wiggle = Math.sin(t * 5 + i) * 0.3;
          points.push(new THREE.Vector3(
            Math.cos(angle + wiggle * 0.1) * r,
            y,
            Math.sin(angle + wiggle * 0.1) * r
          ));
        }
        const curve = new THREE.CatmullRomCurve3(points);
        const tubeGeo = new THREE.TubeGeometry(curve, 12, 0.25 - i * 0.03, 6, false);
        const tube = new THREE.Mesh(tubeGeo, lavaMat);
        volcGroup.add(tube);
      }

      // Point light for lava glow
      const lavaLight = new THREE.PointLight(0xff6600, 2.5, 30);
      lavaLight.position.y = 12;
      volcGroup.add(lavaLight);

      // Secondary warm light lower
      const lavaLight2 = new THREE.PointLight(0xff4400, 1.0, 15);
      lavaLight2.position.y = 5;
      volcGroup.add(lavaLight2);

      volcGroup.position.set(-10, GROUND_Y, -6);
      scene.add(volcGroup);
      return { glow: lavaPool, lavaLight };
    }
    const volcano = buildVolcano();

    // --- Smoke particles from volcano ---
    const SMOKE_COUNT = 30;
    const smokePositions = new Float32Array(SMOKE_COUNT * 3);
    for (let i = 0; i < SMOKE_COUNT; i++) {
      smokePositions[i * 3] = -10 + (Math.random() - 0.5) * 2;
      smokePositions[i * 3 + 1] = GROUND_Y + 12 + Math.random() * 5;
      smokePositions[i * 3 + 2] = -6 + (Math.random() - 0.5) * 2;
    }
    const smokeGeo = new THREE.BufferGeometry();
    smokeGeo.setAttribute('position', new THREE.BufferAttribute(smokePositions, 3));
    const smokeMat = new THREE.PointsMaterial({
      color: 0x888888, size: 0.4, transparent: true, opacity: 0.3, depthWrite: false
    });
    const smoke = new THREE.Points(smokeGeo, smokeMat);
    scene.add(smoke);

    // --- Dust/pollen particles ---
    const DUST_COUNT = 40;
    const dustPositions = new Float32Array(DUST_COUNT * 3);
    for (let i = 0; i < DUST_COUNT; i++) {
      dustPositions[i * 3] = (Math.random() - 0.5) * 30;
      dustPositions[i * 3 + 1] = GROUND_Y + Math.random() * 10;
      dustPositions[i * 3 + 2] = (Math.random() - 0.5) * 25;
    }
    const dustGeo = new THREE.BufferGeometry();
    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0xddcc88, size: 0.15, transparent: true, opacity: 0.4, depthWrite: false
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    // --- Pterodactyls (ambient flying creatures) ---
    const pterodactyls = [];
    function createPterodactyl() {
      const ptero = new THREE.Group();
      // Body
      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.8, 4),
        new THREE.MeshStandardMaterial({ color: 0x6a5a40, roughness: 0.7 })
      );
      body.rotation.x = Math.PI / 2;
      ptero.add(body);

      // Wings (flat triangles)
      const wingGeo = new THREE.BufferGeometry();
      const verts = new Float32Array([
        0, 0, 0,  -1.5, 0, -0.3,  -0.3, 0, -0.5,
      ]);
      wingGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      wingGeo.computeVertexNormals();
      const wingMat = new THREE.MeshStandardMaterial({
        color: 0x7a6a50, roughness: 0.7, side: THREE.DoubleSide
      });
      const leftWing = new THREE.Mesh(wingGeo, wingMat);
      ptero.add(leftWing);
      const rightWing = new THREE.Mesh(wingGeo, wingMat);
      rightWing.scale.x = -1;
      ptero.add(rightWing);

      // Head
      const head = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x6a5a40, roughness: 0.7 })
      );
      head.rotation.x = Math.PI / 2;
      head.position.z = -0.5;
      head.position.y = 0.05;
      ptero.add(head);

      ptero.scale.setScalar(0.6 + Math.random() * 0.3);
      scene.add(ptero);

      return {
        group: ptero,
        heading: Math.random() * Math.PI * 2,
        targetHeading: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 0.8,
        wingPhase: Math.random() * Math.PI * 2,
        wanderTimer: Math.random() * 3,
        leftWing,
        rightWing,
      };
    }

    for (let i = 0; i < 5; i++) {
      const p = createPterodactyl();
      p.group.position.set(
        (Math.random() - 0.5) * 20,
        GROUND_Y + 8 + Math.random() * 5,
        (Math.random() - 0.5) * 20
      );
      pterodactyls.push(p);
    }

    function updatePterodactyls(dt, time) {
      for (const p of pterodactyls) {
        p.wanderTimer -= dt;
        if (p.wanderTimer <= 0) {
          p.targetHeading += (Math.random() - 0.5) * 2;
          p.wanderTimer = 2 + Math.random() * 4;
        }

        // Smooth heading
        let diff = p.targetHeading - p.heading;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        p.heading += diff * dt * 2;

        // Move
        p.group.position.x += Math.sin(p.heading) * p.speed * dt;
        p.group.position.z += Math.cos(p.heading) * p.speed * dt;
        p.group.position.y = GROUND_Y + 9 + Math.sin(time * 0.15 + p.wingPhase * 0.1) * 0.6;
        p.group.rotation.y = p.heading;

        // Wing flap (gentle, soaring)
        p.wingPhase += dt * 2.5;
        const flapAngle = Math.sin(p.wingPhase) * 0.25;
        p.leftWing.rotation.z = flapAngle;
        p.rightWing.rotation.z = -flapAngle;

        // Wall avoidance (wrap around)
        if (p.group.position.x < -18) p.group.position.x = 18;
        if (p.group.position.x > 18) p.group.position.x = -18;
        if (p.group.position.z < -15) p.group.position.z = 20;
        if (p.group.position.z > 25) p.group.position.z = -15;
      }
    }

    // --- Update particles ---
    function updateParticles(dt, time) {
      // Smoke rises from volcano
      const sp = smokeGeo.attributes.position.array;
      for (let i = 0; i < SMOKE_COUNT; i++) {
        sp[i * 3 + 1] += dt * 1.5;
        sp[i * 3] += Math.sin(time + i) * dt * 0.3;
        if (sp[i * 3 + 1] > GROUND_Y + 18) {
          sp[i * 3] = -10 + (Math.random() - 0.5) * 2;
          sp[i * 3 + 1] = GROUND_Y + 12;
          sp[i * 3 + 2] = -6 + (Math.random() - 0.5) * 2;
        }
      }
      smokeGeo.attributes.position.needsUpdate = true;

      // Dust drifts slowly
      const dp = dustGeo.attributes.position.array;
      for (let i = 0; i < DUST_COUNT; i++) {
        dp[i * 3 + 1] += dt * 0.2;
        dp[i * 3] += Math.sin(time * 0.3 + i * 1.7) * dt * 0.1;
        if (dp[i * 3 + 1] > GROUND_Y + 12) {
          dp[i * 3 + 1] = GROUND_Y + 0.5;
        }
      }
      dustGeo.attributes.position.needsUpdate = true;

      // Volcano lava glow pulse
      volcano.glow.material.emissiveIntensity = 2.5 + Math.sin(time * 1.5) * 0.8;
      volcano.lavaLight.intensity = 1.5 + Math.sin(time * 1.8) * 0.5;
    }

    // ===================================================================
    // HERO DINO TEXTURE (procedural)
    // ===================================================================
    function createHeroTexture() {
      const size = 512;
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Earthy gradient background
      const grad = ctx.createRadialGradient(size/2, size/2, 0, size/2, size/2, size/2);
      grad.addColorStop(0, '#8BAA38');
      grad.addColorStop(0.5, '#6B8E23');
      grad.addColorStop(1, '#5a7a1e');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, size, size);

      // Scale-like pattern
      for (let y = 0; y < size; y += 30) {
        for (let x = 0; x < size; x += 26) {
          const offsetX = (Math.floor(y / 30) % 2) * 13;
          ctx.beginPath();
          ctx.arc(x + offsetX, y, 12, 0, Math.PI * 2);
          ctx.strokeStyle = `rgba(90,122,30,0.4)`;
          ctx.lineWidth = 1.5;
          ctx.stroke();
        }
      }

      // Golden shimmer
      const shimmer = ctx.createRadialGradient(size*0.4, size*0.3, 0, size/2, size/2, size/2);
      shimmer.addColorStop(0, 'rgba(201,168,76,0.2)');
      shimmer.addColorStop(1, 'rgba(201,168,76,0)');
      ctx.fillStyle = shimmer;
      ctx.fillRect(0, 0, size, size);

      const tex = new THREE.CanvasTexture(canvas);
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    // ===================================================================
    // LABELS & PROJECTION
    // ===================================================================
    function projectToScreen(pos) {
      const v = pos.clone().project(camera);
      return {
        x: (v.x * 0.5 + 0.5) * innerWidth,
        y: (-v.y * 0.5 + 0.5) * innerHeight,
      };
    }

    function updateLabels() {
      for (const entry of dinoMap.values()) {
        if (!entry.label) continue;
        const headY = entry.height + 0.5;
        const worldPos = new THREE.Vector3(
          entry.group.position.x,
          entry.group.position.y + headY,
          entry.group.position.z
        );
        const screen = projectToScreen(worldPos);
        entry.label.style.left = screen.x + 'px';
        entry.label.style.top = (screen.y - 35) + 'px';

        const age = (performance.now() - entry.labelCreatedAt) / 1000;
        entry.label.style.opacity = Math.min(1, age);
      }
    }

    function updateTitle() {
      const heroEntry = dinoMap.get('hero-dino');
      if (!heroEntry) return;
      titleOpacity = Math.min(1, titleOpacity + 0.008);
      titleLabel.style.opacity = titleOpacity;

      const headY = heroEntry.height + 1.0;
      const worldPos = new THREE.Vector3(
        heroEntry.group.position.x,
        heroEntry.group.position.y + headY,
        heroEntry.group.position.z
      );
      const screen = projectToScreen(worldPos);
      const fontSize = Math.min(48, innerWidth / 10);
      titleLabel.style.fontSize = fontSize + 'px';
      titleLabel.style.left = screen.x + 'px';
      titleLabel.style.top = Math.max(40, screen.y - 40) + 'px';
      titleLabel.style.transform = 'translateX(-50%)';
    }

    // ===================================================================
    // COMMANDS
    // ===================================================================
    function handleCommand(entry, command) {
      if (command === 'come_closer') {
        entry.boostTimer = 8;
        entry.boostTarget = {
          x: 0,
          z: ARENA.zMax - 0.5,
        };
      } else if (command === 'spin') {
        entry.spinRemaining = Math.PI * 6; // 3 full rotations
      } else if (command === 'party_hat') {
        if (entry.partyHat) {
          entry.group.remove(entry.partyHat);
        }
        const hat = createPartyHat();
        const hatScale = 1 / (DINO_SCALES[entry.species] || 1);
        hat.scale.setScalar(hatScale * 0.6);
        hat.position.y = entry.height / (DINO_SCALES[entry.species] || 1) - 0.3;
        entry.group.add(hat);
        entry.partyHat = hat;
        entry.partyHatTimer = 10;
      }
    }

    // ===================================================================
    // NETWORKING (polling + SSE)
    // ===================================================================
    async function pollDinos() {
      if (!landscapeRunning) return;
      try {
        const knownIds = Array.from(dinoMap.keys()).join(',');
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(eventCode)}&knownIds=${encodeURIComponent(knownIds)}`);
        if (!res.ok) return;
        const data = await res.json();
        const serverDinos = data.dinos || [];
        const serverIds = new Set(serverDinos.map(d => d.id));

        // Remove deleted dinos
        for (const [id, entry] of dinoMap) {
          if (!serverIds.has(id)) {
            scene.remove(entry.group);
            if (entry.label) entry.label.remove();
            if (entry.material && entry.material.map) entry.material.map.dispose();
            dinoMap.delete(id);
          }
        }

        // Add new dinos, update existing
        for (const d of serverDinos) {
          if (dinoMap.has(d.id)) {
            const entry = dinoMap.get(d.id);
            if (d.name && d.name !== entry.name) {
              entry.name = d.name;
              if (entry.label) entry.label.textContent = d.name;
            }
          } else if (d.imageData) {
            const entry = await createDino3D(d);
            dinoMap.set(d.id, entry);

            // Auto-showcase new dinos
            if (dinoMap.size > 1 && !d.isHero) {
              entry.boostTimer = 6;
              entry.boostTarget = { x: 0, z: ARENA.zMax - 1 };
            }
          }

          // Process commands
          if (d.command && d.commandId && !processedCommands.has(d.commandId)) {
            processedCommands.add(d.commandId);
            const entry = dinoMap.get(d.id);
            if (entry) handleCommand(entry, d.command);
          }
        }

        // Keep processedCommands bounded
        if (processedCommands.size > 200) {
          const arr = Array.from(processedCommands);
          for (let i = 0; i < 50; i++) processedCommands.delete(arr[i]);
        }
      } catch {}
      pollTimer = setTimeout(pollDinos, 3000);
    }

    function connectSSE() {
      const es = new EventSource(`/api/events?eventCode=${encodeURIComponent(eventCode)}`);
      es.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          if (data.commandId && !processedCommands.has(data.commandId)) {
            processedCommands.add(data.commandId);
            const entry = dinoMap.get(data.turtleId); // turtleId field name kept for compat
            if (entry) handleCommand(entry, data.command);
          }
        } catch {}
      };
      es.addEventListener('delete', (evt) => {
        try {
          const data = JSON.parse(evt.data);
          for (const id of (data.deleted || [])) {
            const entry = dinoMap.get(id);
            if (entry) {
              scene.remove(entry.group);
              if (entry.label) entry.label.remove();
              if (entry.material && entry.material.map) entry.material.map.dispose();
              dinoMap.delete(id);
            }
          }
        } catch {}
      });
    }

    // ===================================================================
    // ANIMATION LOOP
    // ===================================================================
    let lastFrame = 0;

    function animate(now) {
      requestAnimationFrame(animate);
      if (!lastFrame) { lastFrame = now; startTime = now / 1000; }
      let dt = (now - lastFrame) / 1000;
      if (dt > 0.1) dt = 0.1;
      lastFrame = now;
      const time = now / 1000 - startTime;

      for (const entry of dinoMap.values()) {
        updateDinoMovement(entry, dt, time);
      }
      updatePterodactyls(dt, time);
      updateParticles(dt, time);
      updateLabels();
      updateTitle();

      renderer.render(scene, camera);
    }

    // ===================================================================
    // CODE ENTRY & STARTUP
    // ===================================================================
    async function validateCode(code) {
      try {
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(code)}&knownIds=`);
        return res.status;
      } catch { return 0; }
    }

    async function handleCodeSubmit() {
      const code = codeInput.value.trim();
      if (!code) return;
      codeError.textContent = '';
      codeSubmit.disabled = true;
      codeSubmit.textContent = '...';

      const status = await validateCode(code);
      if (status === 200) {
        eventCode = code;
        localStorage.setItem('dinoEventCode', code);
        overlay.style.display = 'none';
        startLandscape();
      } else if (status === 403) {
        codeError.textContent = 'Wrong code. Try again!';
      } else if (status === 429) {
        codeError.textContent = 'Too many attempts. Wait a moment.';
      } else {
        codeError.textContent = 'Connection error.';
      }
      codeSubmit.disabled = false;
      codeSubmit.textContent = 'Enter';
    }

    function startLandscape() {
      if (landscapeRunning) return;
      landscapeRunning = true;
      startTime = performance.now() / 1000;
      pollDinos();
      connectSSE();
      requestAnimationFrame(animate);
    }

    codeSubmit.addEventListener('click', handleCodeSubmit);
    codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCodeSubmit(); });

    // Auto-enter if code saved
    const savedCode = localStorage.getItem('dinoEventCode');
    if (savedCode) {
      validateCode(savedCode).then(status => {
        if (status === 200) {
          eventCode = savedCode;
          overlay.style.display = 'none';
          startLandscape();
        }
      });
    }
  </script>
