<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dinosaurs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #87CEEB; }
    #container {
      width: 100%; height: 100%;
      position: relative;
      background: #87CEEB;
      /* Show full image pinned to top, above the 3D horizon */
    }
    /* Fade edges and bottom to sky blue so image blends smoothly */
    #bg-fade {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60%;
      z-index: 1;
      pointer-events: none;
      /* Mask the image edges — fade is applied to the image itself via a sibling overlay
         that matches the image dimensions, not the viewport */
      display: none;
    }
    /* Blueish sky fog overlay to push bg back */
    #container::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      background: rgba(135, 206, 235, 0.45);
      pointer-events: none;
    }
    #bg-img {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      height: 75%;
      width: auto;
      z-index: 0;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 20%, black 80%, transparent 100%);
    }
    canvas { display: block; position: relative; z-index: 2; }

    #labels {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 3;
    }
    #title-label {
      position: absolute;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      color: #ffe8a0;
      text-shadow: 0 3px 12px rgba(0,0,0,0.6), 0 1px 2px rgba(0,0,0,0.4);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .dino-label {
      position: absolute;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: white;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
      white-space: nowrap;
      transform: translateX(-50%);
      opacity: 0;
      transition: opacity 0.5s;
    }

    #overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30,50,20,0.92);
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
    }
    .code-box {
      background: rgba(255,255,255,0.95);
      border-radius: 20px;
      padding: 36px 32px;
      text-align: center;
      max-width: 340px;
      width: 90%;
    }
    .code-box h1 { color: #5a3e1b; font-family: 'Nunito', sans-serif; font-size: 26px; margin-bottom: 12px; }
    .code-box p { color: #666; margin-bottom: 18px; font-size: 15px; }
    .code-box input {
      width: 100%; padding: 14px; border: 2px solid #ddd; border-radius: 12px;
      font-size: 20px; text-align: center; margin-bottom: 14px; letter-spacing: 4px;
      -webkit-appearance: none;
    }
    .code-box input:focus { outline: none; border-color: #8B6914; }
    .code-box button {
      width: 100%; padding: 14px; background: #8B6914; color: white;
      border: none; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer;
    }
    .code-box button:active { background: #6d5210; }
    .error { color: #c00; font-size: 14px; margin-top: 10px; min-height: 20px; }
  </style>
</head>
<body>
  <div id="container"><img id="bg-img" src="/dino_bg.png" alt=""><div id="bg-fade"></div></div>
  <div id="labels"><div id="title-label">Dinosaurs</div></div>

  <div id="overlay">
    <div class="code-box">
      <h1>Dinosaurs</h1>
      <p>Enter the Dino Code</p>
      <input type="text" id="codeInput" inputmode="numeric" pattern="\d*" maxlength="10" autocomplete="off">
      <button id="codeSubmit">Enter</button>
      <div class="error" id="codeError"></div>
    </div>
  </div>

  <script type="importmap">
  { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- DOM ---
    const container = document.getElementById('container');
    const labelsDiv = document.getElementById('labels');
    const titleLabel = document.getElementById('title-label');
    const overlay = document.getElementById('overlay');
    const codeInput = document.getElementById('codeInput');
    const codeSubmit = document.getElementById('codeSubmit');
    const codeError = document.getElementById('codeError');

    // --- Fetch config title ---
    fetch('/api/config?mode=dinos').then(r => r.json()).then(cfg => {
      const t = cfg.title || 'Dinosaurs';
      document.title = t;
      titleLabel.textContent = t;
      document.querySelector('.code-box h1').textContent = t;
    }).catch(() => {});

    // --- State ---
    let eventCode = '';
    const dinoMap = new Map();
    let landscapeRunning = false;
    let pollTimer = null;
    const processedCommands = new Set();
    let titleOpacity = 0;
    let startTime = 0;

    // --- Arena ---
    const ARENA = { xMin: -16, xMax: 16, zMin: -10, zMax: 7 };
    const GROUND_Y = -6;

    // --- Scene ---
    const scene = new THREE.Scene();
    // Transparent canvas — CSS background shows dino_bg.png with sky-blue fade
    scene.fog = new THREE.FogExp2(0x9DC4E8, 0.008);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 100);
    camera.position.set(0, 2, ARENA.zMax + 6);
    camera.lookAt(0, -1, 4);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(innerWidth, innerHeight);
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // --- Lighting (warm, sunny) ---
    const ambientLight = new THREE.AmbientLight(0xfff5e0, 0.7);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
    sunLight.position.set(5, 15, 8);
    scene.add(sunLight);

    const warmFill = new THREE.DirectionalLight(0xffcc66, 0.4);
    warmFill.position.set(-4, 8, -2);
    scene.add(warmFill);

    // --- Shared materials ---
    const woodMat = new THREE.MeshStandardMaterial({
      color: 0xC4A06A, roughness: 0.85, metalness: 0
    });

    // ===================================================================
    // SVG PATH → THREE.Shape
    // ===================================================================
    // Server traces PNGs with potrace at startup. We fetch the SVG paths.

    const DINO_SCALES = { trex: 1.0, triceratops: 0.95, brachiosaurus: 1.1 };
    const DINO_SPEEDS = { trex: 1.2, triceratops: 0.9, brachiosaurus: 0.6 };
    // PNG facing direction offsets: T-Rex faces left (-X), others face right (+X)
    // This offset is added to the movement heading to align the visual forward
    const DINO_FACING_OFFSET = { trex: Math.PI / 2, triceratops: -Math.PI / 2, brachiosaurus: -Math.PI / 2 };

    // --- Shape cache ---
    const shapeCache = new Map();

    // Parse an SVG path d-string into a THREE.Shape
    function svgPathToShape(pathStr, svgWidth, svgHeight, targetHeight) {
      const sc = targetHeight / svgHeight;
      const shape = new THREE.Shape();
      const re = /([MLCQZmlcqz])\s*([^MLCQZmlcqz]*)/gi;
      let match, curX = 0, curY = 0;

      while ((match = re.exec(pathStr)) !== null) {
        const cmd = match[1];
        const nums = match[2].trim().length > 0 ? match[2].trim().split(/[\s,]+/).map(Number) : [];
        switch (cmd) {
          case 'M': for (let i=0;i<nums.length;i+=2){curX=nums[i];curY=nums[i+1];if(i===0)shape.moveTo(curX*sc,(svgHeight-curY)*sc);else shape.lineTo(curX*sc,(svgHeight-curY)*sc);} break;
          case 'm': for (let i=0;i<nums.length;i+=2){curX+=nums[i];curY+=nums[i+1];if(i===0)shape.moveTo(curX*sc,(svgHeight-curY)*sc);else shape.lineTo(curX*sc,(svgHeight-curY)*sc);} break;
          case 'L': for (let i=0;i<nums.length;i+=2){curX=nums[i];curY=nums[i+1];shape.lineTo(curX*sc,(svgHeight-curY)*sc);} break;
          case 'l': for (let i=0;i<nums.length;i+=2){curX+=nums[i];curY+=nums[i+1];shape.lineTo(curX*sc,(svgHeight-curY)*sc);} break;
          case 'C': for (let i=0;i<nums.length;i+=6){shape.bezierCurveTo(nums[i]*sc,(svgHeight-nums[i+1])*sc,nums[i+2]*sc,(svgHeight-nums[i+3])*sc,nums[i+4]*sc,(svgHeight-nums[i+5])*sc);curX=nums[i+4];curY=nums[i+5];} break;
          case 'c': for (let i=0;i<nums.length;i+=6){shape.bezierCurveTo((curX+nums[i])*sc,(svgHeight-(curY+nums[i+1]))*sc,(curX+nums[i+2])*sc,(svgHeight-(curY+nums[i+3]))*sc,(curX+nums[i+4])*sc,(svgHeight-(curY+nums[i+5]))*sc);curX+=nums[i+4];curY+=nums[i+5];} break;
          case 'Q': for (let i=0;i<nums.length;i+=4){shape.quadraticCurveTo(nums[i]*sc,(svgHeight-nums[i+1])*sc,nums[i+2]*sc,(svgHeight-nums[i+3])*sc);curX=nums[i+2];curY=nums[i+3];} break;
          case 'q': for (let i=0;i<nums.length;i+=4){shape.quadraticCurveTo((curX+nums[i])*sc,(svgHeight-(curY+nums[i+1]))*sc,(curX+nums[i+2])*sc,(svgHeight-(curY+nums[i+3]))*sc);curX+=nums[i+2];curY+=nums[i+3];} break;
          case 'Z': case 'z': shape.closePath(); break;
        }
      }
      return shape;
    }

    // Fetch traced SVG paths from server, cache shapes
    let dinoPaths = null;
    async function getSpeciesShape(species) {
      if (shapeCache.has(species)) return shapeCache.get(species);
      if (!dinoPaths) {
        const res = await fetch('/api/dino-paths');
        dinoPaths = await res.json();
      }
      const info = dinoPaths[species] || dinoPaths.trex;
      const targetHeight = 3.0;
      const sc = targetHeight / info.height;
      const shape = svgPathToShape(info.path, info.width, info.height, targetHeight);
      const result = { shape, imgWidth: info.width * sc, imgHeight: targetHeight };
      shapeCache.set(species, result);
      return result;
    }

    // ===================================================================
    // UV GENERATOR for ExtrudeGeometry
    // ===================================================================
    function makeUVGenerator(imgWidth, imgHeight) {
      return {
        generateTopUV(geometry, vertices, indexA, indexB, indexC) {
          const ax = vertices[indexA*3], ay = vertices[indexA*3+1];
          const bx = vertices[indexB*3], by = vertices[indexB*3+1];
          const cx = vertices[indexC*3], cy = vertices[indexC*3+1];
          return [
            new THREE.Vector2(ax/imgWidth, ay/imgHeight),
            new THREE.Vector2(bx/imgWidth, by/imgHeight),
            new THREE.Vector2(cx/imgWidth, cy/imgHeight),
          ];
        },
        generateSideWallUV() {
          return [
            new THREE.Vector2(0,0), new THREE.Vector2(1,0),
            new THREE.Vector2(1,1), new THREE.Vector2(0,1),
          ];
        }
      };
    }

    // ===================================================================
    // TEXTURE LOADING
    // ===================================================================
    function loadDinoTexture(dataURI) {
      return new Promise((resolve) => {
        const img = new Image();
        img.onload = () => {
          const w = img.width, h = img.height;
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0);
          const imgData = ctx.getImageData(0, 0, w, h);
          const d = imgData.data;
          for (let i = 0; i < d.length; i += 4) {
            if (d[i+3] < 10) continue;
            for (let c = 0; c < 3; c++) {
              let v = d[i+c] / 255;
              v = v < 0.5 ? 0.5*Math.pow(2*v,2.8) : 1-0.5*Math.pow(2*(1-v),2.8);
              d[i+c] = Math.round(v * 255);
            }
          }
          ctx.putImageData(imgData, 0, 0);
          const tex = new THREE.CanvasTexture(canvas);
          tex.colorSpace = THREE.SRGBColorSpace;
          resolve(tex);
        };
        img.src = dataURI;
      });
    }

    // ===================================================================
    // CREATE DINO 3D (potrace-traced wooden cutout)
    // ===================================================================
    async function createDino3D(serverData) {
      const species = serverData.species || 'trex';
      const scale = DINO_SCALES[species] || 1.0;
      const { shape, imgWidth, imgHeight } = await getSpeciesShape(species);

      const geometry = new THREE.ExtrudeGeometry(shape, {
        depth: 0.3, bevelEnabled: false,
        UVGenerator: makeUVGenerator(imgWidth, imgHeight),
      });

      let frontBackMat;
      if (serverData.imageData) {
        const tex = await loadDinoTexture(serverData.imageData);
        frontBackMat = new THREE.MeshStandardMaterial({
          map: tex, roughness: 0.6, metalness: 0, side: THREE.DoubleSide,
        });
      } else {
        frontBackMat = new THREE.MeshStandardMaterial({ color: 0x8BAA38, roughness: 0.6 });
      }

      const mesh = new THREE.Mesh(geometry, [frontBackMat, woodMat]);
      geometry.computeBoundingBox();
      const bb = geometry.boundingBox;
      const cx = (bb.min.x + bb.max.x) / 2;
      const cy = bb.min.y;
      const cz = (bb.min.z + bb.max.z) / 2;
      mesh.geometry.translate(-cx, -cy, -cz);

      const group = new THREE.Group();
      group.add(mesh);
      group.scale.setScalar(scale);

      const shadowGeo = new THREE.CircleGeometry(1.2, 16);
      const shadowMat2 = new THREE.MeshBasicMaterial({
        color: 0x000000, transparent: true, opacity: 0.2, depthWrite: false
      });
      const shadow = new THREE.Mesh(shadowGeo, shadowMat2);
      shadow.rotation.x = -Math.PI / 2;
      shadow.position.y = -0.01 / scale;
      group.add(shadow);
      scene.add(group);

      const dinoHeight = (bb.max.y - bb.min.y) * scale;
      if (serverData.isHero) {
        group.position.set(0, GROUND_Y, 6);
      } else {
        group.position.set(
          -8 + Math.random() * 16, GROUND_Y,
          10
        );
      }

      const entry = {
        id: serverData.id, name: serverData.name,
        species, group, mesh, shadow,
        material: frontBackMat, height: dinoHeight,
        heading: (Math.random() - 0.5) * 0.4,  // mostly facing camera
        speed: (serverData.speed||60)/300*(DINO_SPEEDS[species]||1),
        wanderTimer: Math.random()*2,  // pick first waypoint quickly
        waypointX: -8 + Math.random() * 16,
        waypointZ: ARENA.zMin + Math.random() * (ARENA.zMax - ARENA.zMin),
        walkPhase: Math.random()*Math.PI*2,
        boostTimer: 0, boostTarget: null,
        spinRemaining: 0, jumpTimer: 0,
        partyHat: null, partyHatTimer: 0,
        label: null, labelCreatedAt: performance.now(),
        isHero: serverData.isHero || false,
      };

      if (!serverData.isHero) {
        const lbl = document.createElement('div');
        lbl.className = 'dino-label';
        lbl.textContent = serverData.name;
        labelsDiv.appendChild(lbl);
        entry.label = lbl;
      }

      // Hero T-Rex gets a permanent birthday cake on its head
      if (serverData.isHero) {
        const cake = createBirthdayCake();
        const s = DINO_SCALES[species] || 1;
        cake.scale.setScalar(0.4 / s);
        // Position on top of head (T-Rex head is upper-left of image)
        cake.position.set(-1.8 / s, 3.1 / s, 0);
        group.add(cake);
      }

      return entry;
    }

    // ===================================================================
    // BIRTHDAY CAKE (for hero dino)
    // ===================================================================
    function createBirthdayCake() {
      const cakeGroup = new THREE.Group();
      // Bottom tier
      const bottom = new THREE.Mesh(
        new THREE.CylinderGeometry(0.6, 0.65, 0.4, 12),
        new THREE.MeshStandardMaterial({ color: 0xF5E6CA, roughness: 0.6 })
      );
      bottom.position.y = 0.2;
      cakeGroup.add(bottom);
      // Top tier
      const top = new THREE.Mesh(
        new THREE.CylinderGeometry(0.4, 0.45, 0.35, 12),
        new THREE.MeshStandardMaterial({ color: 0xFFB6C1, roughness: 0.5 })
      );
      top.position.y = 0.57;
      cakeGroup.add(top);
      // Frosting ring
      const frosting = new THREE.Mesh(
        new THREE.TorusGeometry(0.42, 0.06, 6, 16),
        new THREE.MeshStandardMaterial({ color: 0xFFFFFF, roughness: 0.3 })
      );
      frosting.rotation.x = Math.PI / 2;
      frosting.position.y = 0.4;
      cakeGroup.add(frosting);
      // Candle
      const candle = new THREE.Mesh(
        new THREE.CylinderGeometry(0.04, 0.04, 0.4, 6),
        new THREE.MeshStandardMaterial({ color: 0xFF6B9D })
      );
      candle.position.y = 0.95;
      cakeGroup.add(candle);
      // Flame
      const flame = new THREE.Mesh(
        new THREE.SphereGeometry(0.06, 6, 6),
        new THREE.MeshStandardMaterial({ color: 0xFFAA00, emissive: 0xFF8800, emissiveIntensity: 1.5 })
      );
      flame.scale.y = 1.6;
      flame.position.y = 1.2;
      cakeGroup.add(flame);
      return cakeGroup;
    }

    // ===================================================================
    // PARTY HAT
    // ===================================================================
    function createPartyHat() {
      const hatGroup = new THREE.Group();
      // Cone hat
      const cone = new THREE.Mesh(
        new THREE.ConeGeometry(0.4, 1.0, 8),
        new THREE.MeshStandardMaterial({ color: 0xff3388, roughness: 0.5 })
      );
      cone.position.y = 0.5;
      hatGroup.add(cone);
      // Pom-pom
      const pom = new THREE.Mesh(
        new THREE.SphereGeometry(0.15, 8, 8),
        new THREE.MeshStandardMaterial({ color: 0xffdd00, roughness: 0.3 })
      );
      pom.position.y = 1.05;
      hatGroup.add(pom);
      // Brim (torus)
      const brim = new THREE.Mesh(
        new THREE.TorusGeometry(0.4, 0.05, 6, 12),
        new THREE.MeshStandardMaterial({ color: 0xff3388, roughness: 0.5 })
      );
      brim.rotation.x = Math.PI / 2;
      hatGroup.add(brim);
      return hatGroup;
    }

    // ===================================================================
    // MOVEMENT SYSTEM
    // ===================================================================
    // Dinos always walk forward in the direction they face. To reverse,
    // they turn first then walk. Each species' PNG has a forward direction:
    //   T-Rex faces left, Triceratops & Brachiosaurus face right.
    // DINO_FACING_OFFSET maps movement heading → visual rotation.

    function updateDinoMovement(entry, dt, time) {
      const { group } = entry;
      const speedMult = entry.boostTimer > 0 ? 3.0 : 1.0;
      const facingOffset = DINO_FACING_OFFSET[entry.species] || -Math.PI / 2;

      // --- Spin (command) ---
      if (entry.spinRemaining > 0) {
        const spinSpeed = Math.PI * 3;
        entry.heading += spinSpeed * dt;
        entry.spinRemaining -= spinSpeed * dt;
        if (entry.spinRemaining <= 0) entry.spinRemaining = 0;
      }

      // --- Come closer (command) ---
      if (entry.boostTimer > 0) {
        entry.boostTimer -= dt;
        entry.waypointX = entry.boostTarget.x;
        entry.waypointZ = entry.boostTarget.z;
      }

      // --- Pick waypoints (spread across arena, sometimes diagonal) ---
      entry.wanderTimer -= dt;
      if (entry.wanderTimer <= 0 && entry.boostTimer <= 0) {
        entry.waypointX = ARENA.xMin + Math.random() * (ARENA.xMax - ARENA.xMin);
        entry.waypointZ = ARENA.zMin + Math.random() * (ARENA.zMax - ARENA.zMin);
        entry.wanderTimer = 4 + Math.random() * 6;
      }

      // --- Compute desired heading toward waypoint ---
      const dx = (entry.waypointX || 0) - group.position.x;
      const dz = (entry.waypointZ || 0) - group.position.z;
      const dist = Math.sqrt(dx * dx + dz * dz);
      const moveSpeed = entry.speed * speedMult * 3.0;

      if (dist > 0.5) {
        const targetHeading = Math.atan2(dx, dz);

        // --- Smooth turn toward target (turn first, then walk) ---
        if (entry.spinRemaining <= 0) {
          let diff = targetHeading - entry.heading;
          while (diff > Math.PI) diff -= Math.PI * 2;
          while (diff < -Math.PI) diff += Math.PI * 2;
          const turnRate = 2.5;
          entry.heading += diff * Math.min(1, dt * turnRate);
        }

        // --- Only walk forward when roughly facing the right way ---
        let facingDiff = entry.heading - Math.atan2(dx, dz);
        while (facingDiff > Math.PI) facingDiff -= Math.PI * 2;
        while (facingDiff < -Math.PI) facingDiff += Math.PI * 2;
        if (Math.abs(facingDiff) < Math.PI * 0.5) {
          // Walk forward in the direction we're facing
          group.position.x += Math.sin(entry.heading) * moveSpeed * dt;
          group.position.z += Math.cos(entry.heading) * moveSpeed * dt;
        }
      } else if (entry.boostTimer <= 0) {
        entry.wanderTimer = Math.min(entry.wanderTimer, 0.5);
      }

      // --- Separation: gentle push away from nearby dinos ---
      const SEPARATION_DIST = 3.0;
      for (const other of dinoMap.values()) {
        if (other.id === entry.id) continue;
        const sx = group.position.x - other.group.position.x;
        const sz = group.position.z - other.group.position.z;
        const sDist = Math.sqrt(sx * sx + sz * sz);
        if (sDist < SEPARATION_DIST && sDist > 0.01) {
          const pushStrength = (SEPARATION_DIST - sDist) / SEPARATION_DIST * 2.0 * dt;
          group.position.x += (sx / sDist) * pushStrength;
          group.position.z += (sz / sDist) * pushStrength;
        } else if (sDist <= 0.01) {
          // Overlapping exactly (e.g. same spawn point) — nudge randomly
          group.position.x += (Math.random() - 0.5) * 0.5;
          group.position.z += (Math.random() - 0.5) * 0.5;
        }
      }

      // --- Wall clamping ---
      group.position.x = Math.max(ARENA.xMin, Math.min(ARENA.xMax, group.position.x));
      group.position.z = Math.max(ARENA.zMin, Math.min(ARENA.zMax, group.position.z));

      // --- Apply visual rotation (heading + species facing offset) ---
      group.rotation.y = entry.heading + facingOffset;

      // --- Walking animation (always bounce — dinos are always on the move) ---
      const walkRate = 5 + moveSpeed * 8;
      entry.walkPhase += dt * walkRate;
      const rock = Math.sin(entry.walkPhase) * 0.05;
      const sway = Math.sin(entry.walkPhase * 0.5) * 0.03;
      const bob = Math.abs(Math.sin(entry.walkPhase)) * 0.10;
      group.rotation.x = rock;
      group.rotation.z = sway;

      // --- Jump ---
      let jumpY = 0;
      if (entry.jumpTimer > 0) {
        entry.jumpTimer += dt;
        const JUMP_DUR = 0.8;
        if (entry.jumpTimer < JUMP_DUR) {
          const t = entry.jumpTimer / JUMP_DUR;
          jumpY = Math.sin(t * Math.PI) * 4.0; // big arc
        } else {
          entry.jumpTimer = 0;
        }
      }
      group.position.y = GROUND_Y + bob + jumpY;

      // --- Party hat timer ---
      if (entry.partyHat && entry.partyHatTimer > 0) {
        entry.partyHatTimer -= dt;
        if (entry.partyHatTimer <= 0) {
          entry.group.remove(entry.partyHat);
          entry.partyHat = null;
        }
      }
    }

    // ===================================================================
    // ENVIRONMENT
    // ===================================================================

    // --- Ground plane ---
    function buildGround() {
      const gw = 512, gh = 256;
      const canvas = document.createElement('canvas');
      canvas.width = gw; canvas.height = gh;
      const ctx = canvas.getContext('2d');

      // Gradient: green near camera → brown far
      const grad = ctx.createLinearGradient(0, 0, 0, gh);
      grad.addColorStop(0, '#8B7355');  // far (brown/dirt)
      grad.addColorStop(0.5, '#6B8E23'); // mid (olive)
      grad.addColorStop(1, '#4a7a2e');  // near (green)
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, gw, gh);

      // Grass speckle
      for (let i = 0; i < 800; i++) {
        const x = Math.random() * gw;
        const y = Math.random() * gh;
        const green = 80 + Math.random() * 80;
        ctx.fillStyle = `rgba(${30 + Math.random() * 40},${green},${20 + Math.random() * 30},0.4)`;
        ctx.fillRect(x, y, 1 + Math.random() * 2, 1 + Math.random() * 3);
      }

      const tex = new THREE.CanvasTexture(canvas);
      const mat = new THREE.MeshStandardMaterial({
        map: tex, roughness: 0.95, metalness: 0,
      });
      const plane = new THREE.Mesh(new THREE.PlaneGeometry(50, 35), mat);
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(0, GROUND_Y - 0.05, 5);
      scene.add(plane);
    }
    buildGround();

    // --- Winding river ---
    function buildRiver() {
      // Define winding path points across the ground
      const points = [
        new THREE.Vector3(-18, GROUND_Y + 0.2, 8),
        new THREE.Vector3(-12, GROUND_Y + 0.2, 5),
        new THREE.Vector3(-6,  GROUND_Y + 0.2, 7),
        new THREE.Vector3(-1,  GROUND_Y + 0.2, 3),
        new THREE.Vector3(4,   GROUND_Y + 0.2, 5),
        new THREE.Vector3(9,   GROUND_Y + 0.2, 1),
        new THREE.Vector3(14,  GROUND_Y + 0.2, 3),
        new THREE.Vector3(20,  GROUND_Y + 0.2, 0),
      ];
      const curve = new THREE.CatmullRomCurve3(points);

      // Flat ribbon: custom geometry from curve samples
      const segments = 80;
      const riverWidth = 1.2;
      const positions = [];
      const uvs = [];
      const indices = [];

      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        const pt = curve.getPoint(t);
        const tangent = curve.getTangent(t);
        // Perpendicular on the xz plane
        const perp = new THREE.Vector3(-tangent.z, 0, tangent.x).normalize();
        const w = riverWidth * (0.8 + 0.4 * Math.sin(t * Math.PI * 3)); // slight width variation

        positions.push(pt.x - perp.x * w, pt.y, pt.z - perp.z * w);
        positions.push(pt.x + perp.x * w, pt.y, pt.z + perp.z * w);
        uvs.push(0, t);
        uvs.push(1, t);

        if (i < segments) {
          const a = i * 2, b = i * 2 + 1, c = (i + 1) * 2, d = (i + 1) * 2 + 1;
          indices.push(a, c, b);
          indices.push(b, c, d);
        }
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
      geo.setAttribute('uv', new THREE.Float32BufferAttribute(uvs, 2));
      geo.setIndex(indices);
      geo.computeVertexNormals();

      const riverMat = new THREE.MeshBasicMaterial({
        color: 0x2288cc,
        side: THREE.DoubleSide,
      });

      const river = new THREE.Mesh(geo, riverMat);
      scene.add(river);
    }
    buildRiver();

    // --- Rocks ---
    function addRocks() {
      const rockMat = new THREE.MeshStandardMaterial({ color: 0x888080, roughness: 0.9 });
      const positions = [
        [-8, 0.3, 3], [10, 0.25, -2], [-5, 0.35, 10], [7, 0.2, 8],
        [2, 0.3, -4], [-10, 0.25, 7], [11, 0.3, 12],
      ];
      for (const [x, s, z] of positions) {
        const rock = new THREE.Mesh(
          new THREE.SphereGeometry(s + Math.random() * 0.3, 6, 5),
          rockMat
        );
        rock.position.set(x, GROUND_Y + s * 0.3, z);
        rock.scale.set(1 + Math.random() * 0.5, 0.5 + Math.random() * 0.5, 1 + Math.random() * 0.5);
        scene.add(rock);
      }
    }
    addRocks();

    // --- Trees ---
    function createTree(x, z, height, canopyType) {
      const tree = new THREE.Group();
      // Trunk
      const trunk = new THREE.Mesh(
        new THREE.CylinderGeometry(0.15, 0.25, height, 6),
        new THREE.MeshStandardMaterial({ color: 0x6B4226, roughness: 0.9 })
      );
      trunk.position.y = height / 2;
      tree.add(trunk);

      if (canopyType === 'pine') {
        // Pine tree — stacked cones
        for (let i = 0; i < 3; i++) {
          const cone = new THREE.Mesh(
            new THREE.ConeGeometry(1.2 - i * 0.3, 1.5 - i * 0.2, 7),
            new THREE.MeshStandardMaterial({ color: 0x2d5a1e, roughness: 0.8 })
          );
          cone.position.y = height * 0.6 + i * 0.8;
          tree.add(cone);
        }
      } else {
        // Round canopy
        const canopy = new THREE.Mesh(
          new THREE.SphereGeometry(1.0 + Math.random() * 0.5, 7, 6),
          new THREE.MeshStandardMaterial({ color: 0x3a7a20, roughness: 0.8 })
        );
        canopy.position.y = height + 0.5;
        canopy.scale.y = 0.75;
        tree.add(canopy);
      }

      tree.position.set(x, GROUND_Y, z);
      scene.add(tree);
    }

    // Place trees in corners so they don't block the background
    createTree(-14, -5, 3.0, 'pine');
    createTree(-13, -7, 2.5, 'round');
    createTree(14, -5, 2.8, 'pine');
    createTree(13, -7, 3.2, 'round');
    createTree(-13, 15, 2.5, 'pine');
    createTree(13, 15, 2.8, 'round');
    createTree(-15, 10, 3.5, 'pine');
    createTree(15, 10, 2.0, 'round');

    // (volcano removed)


    // --- Pterodactyls (ambient flying creatures) ---
    const pterodactyls = [];
    function createPterodactyl() {
      const ptero = new THREE.Group();
      // Body
      const body = new THREE.Mesh(
        new THREE.ConeGeometry(0.15, 0.8, 4),
        new THREE.MeshStandardMaterial({ color: 0x6a5a40, roughness: 0.7 })
      );
      body.rotation.x = Math.PI / 2;
      ptero.add(body);

      // Wings (flat triangles)
      const wingGeo = new THREE.BufferGeometry();
      const verts = new Float32Array([
        0, 0, 0,  -1.5, 0, -0.3,  -0.3, 0, -0.5,
      ]);
      wingGeo.setAttribute('position', new THREE.BufferAttribute(verts, 3));
      wingGeo.computeVertexNormals();
      const wingMat = new THREE.MeshStandardMaterial({
        color: 0x7a6a50, roughness: 0.7, side: THREE.DoubleSide
      });
      const leftWing = new THREE.Mesh(wingGeo, wingMat);
      ptero.add(leftWing);
      const rightWing = new THREE.Mesh(wingGeo, wingMat);
      rightWing.scale.x = -1;
      ptero.add(rightWing);

      // Head
      const head = new THREE.Mesh(
        new THREE.ConeGeometry(0.08, 0.3, 4),
        new THREE.MeshStandardMaterial({ color: 0x6a5a40, roughness: 0.7 })
      );
      head.rotation.x = Math.PI / 2;
      head.position.z = -0.5;
      head.position.y = 0.05;
      ptero.add(head);

      ptero.scale.setScalar(0.6 + Math.random() * 0.3);
      scene.add(ptero);

      return {
        group: ptero,
        heading: Math.random() * Math.PI * 2,
        targetHeading: Math.random() * Math.PI * 2,
        speed: 0.6 + Math.random() * 0.8,
        wingPhase: Math.random() * Math.PI * 2,
        wanderTimer: Math.random() * 3,
        leftWing,
        rightWing,
      };
    }

    for (let i = 0; i < 5; i++) {
      const p = createPterodactyl();
      p.group.position.set(
        (Math.random() - 0.5) * 20,
        GROUND_Y + 8 + Math.random() * 5,
        (Math.random() - 0.5) * 20
      );
      pterodactyls.push(p);
    }

    function updatePterodactyls(dt, time) {
      for (const p of pterodactyls) {
        p.wanderTimer -= dt;
        if (p.wanderTimer <= 0) {
          p.targetHeading += (Math.random() - 0.5) * 2;
          p.wanderTimer = 2 + Math.random() * 4;
        }

        // Smooth heading
        let diff = p.targetHeading - p.heading;
        while (diff > Math.PI) diff -= Math.PI * 2;
        while (diff < -Math.PI) diff += Math.PI * 2;
        p.heading += diff * dt * 2;

        // Move
        p.group.position.x += Math.sin(p.heading) * p.speed * dt;
        p.group.position.z += Math.cos(p.heading) * p.speed * dt;
        p.group.position.y = GROUND_Y + 9 + Math.sin(time * 0.15 + p.wingPhase * 0.1) * 0.6;
        p.group.rotation.y = p.heading;

        // Wing flap (gentle, soaring)
        p.wingPhase += dt * 2.5;
        const flapAngle = Math.sin(p.wingPhase) * 0.25;
        p.leftWing.rotation.z = flapAngle;
        p.rightWing.rotation.z = -flapAngle;

        // Wall avoidance (wrap around)
        if (p.group.position.x < -18) p.group.position.x = 18;
        if (p.group.position.x > 18) p.group.position.x = -18;
        if (p.group.position.z < -15) p.group.position.z = 20;
        if (p.group.position.z > 25) p.group.position.z = -15;
      }
    }


    // ===================================================================
    // LABELS & PROJECTION
    // ===================================================================
    function projectToScreen(pos) {
      const v = pos.clone().project(camera);
      return {
        x: (v.x * 0.5 + 0.5) * innerWidth,
        y: (-v.y * 0.5 + 0.5) * innerHeight,
      };
    }

    function updateLabels() {
      for (const entry of dinoMap.values()) {
        if (!entry.label) continue;
        const headY = entry.height - 0.3;
        const worldPos = new THREE.Vector3(
          entry.group.position.x,
          entry.group.position.y + headY,
          entry.group.position.z
        );
        const screen = projectToScreen(worldPos);
        entry.label.style.left = screen.x + 'px';
        entry.label.style.top = (screen.y - 35) + 'px';

        const age = (performance.now() - entry.labelCreatedAt) / 1000;
        entry.label.style.opacity = Math.min(1, age);
      }
    }

    function updateTitle() {
      const heroEntry = dinoMap.get('hero-dino');
      if (!heroEntry) return;
      titleOpacity = Math.min(1, titleOpacity + 0.008);
      titleLabel.style.opacity = titleOpacity;

      const headY = heroEntry.height + 1.0;
      const worldPos = new THREE.Vector3(
        heroEntry.group.position.x,
        heroEntry.group.position.y + headY,
        heroEntry.group.position.z
      );
      const screen = projectToScreen(worldPos);
      const fontSize = Math.min(48, innerWidth / 10);
      titleLabel.style.fontSize = fontSize + 'px';
      titleLabel.style.left = screen.x + 'px';
      titleLabel.style.top = Math.max(40, screen.y - 40) + 'px';
      titleLabel.style.transform = 'translateX(-50%)';
    }

    // ===================================================================
    // COMMANDS
    // ===================================================================
    function handleCommand(entry, command) {
      if (command === 'come_closer') {
        entry.boostTimer = 8;
        entry.boostTarget = {
          x: 0,
          z: ARENA.zMax - 1,
        };
      } else if (command === 'spin') {
        entry.spinRemaining = Math.PI * 6; // 3 full rotations
      } else if (command === 'jump') {
        entry.jumpTimer = 0.001; // start jump
      } else if (command === 'party_hat') {
        if (entry.partyHat) {
          entry.group.remove(entry.partyHat);
        }
        const hat = createPartyHat();
        const s = DINO_SCALES[entry.species] || 1;
        hat.scale.setScalar(0.5 / s);
        // Hat position on head — species-specific (in shape local coords before centering)
        // Images are 1408x768, shape is targetHeight=3.0, so shapeW = 3.0 * 1408/768 ≈ 5.5
        // Position is relative to group center, so we need to offset from center
        const HAT_POS = {
          trex:          { x: -1.8, y: 2.9 },
          triceratops:   { x: 1.6,  y: 2.5 },
          brachiosaurus: { x: 2.5,  y: 3.3 },
        };
        const hp = HAT_POS[entry.species] || HAT_POS.trex;
        hat.position.set(hp.x / s, hp.y / s, 0);
        entry.group.add(hat);
        entry.partyHat = hat;
        entry.partyHatTimer = 10;
      }
    }

    // ===================================================================
    // NETWORKING (polling + SSE)
    // ===================================================================
    async function pollDinos() {
      if (!landscapeRunning) return;
      try {
        const knownIds = Array.from(dinoMap.keys()).join(',');
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(eventCode)}&knownIds=${encodeURIComponent(knownIds)}`);
        if (!res.ok) return;
        const data = await res.json();
        const serverDinos = data.dinos || [];
        const serverIds = new Set(serverDinos.map(d => d.id));

        // Remove deleted dinos
        for (const [id, entry] of dinoMap) {
          if (!serverIds.has(id)) {
            scene.remove(entry.group);
            if (entry.label) entry.label.remove();
            if (entry.material && entry.material.map) entry.material.map.dispose();
            dinoMap.delete(id);
          }
        }

        // Add new dinos, update existing
        for (const d of serverDinos) {
          if (dinoMap.has(d.id)) {
            const entry = dinoMap.get(d.id);
            if (d.name && d.name !== entry.name) {
              entry.name = d.name;
              if (entry.label) entry.label.textContent = d.name;
            }
          } else if (d.imageData) {
            const entry = await createDino3D(d);
            dinoMap.set(d.id, entry);

            // Auto-showcase new dinos
            if (dinoMap.size > 1 && !d.isHero) {
              entry.boostTimer = 6;
              entry.boostTarget = { x: 0, z: ARENA.zMax - 2 };
            }
          }

          // Process commands
          if (d.command && d.commandId && !processedCommands.has(d.commandId)) {
            processedCommands.add(d.commandId);
            const entry = dinoMap.get(d.id);
            if (entry) handleCommand(entry, d.command);
          }
        }

        // Keep processedCommands bounded
        if (processedCommands.size > 200) {
          const arr = Array.from(processedCommands);
          for (let i = 0; i < 50; i++) processedCommands.delete(arr[i]);
        }
      } catch {}
      pollTimer = setTimeout(pollDinos, 3000);
    }

    function connectSSE() {
      const es = new EventSource(`/api/events?eventCode=${encodeURIComponent(eventCode)}`);
      es.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          if (data.commandId && !processedCommands.has(data.commandId)) {
            processedCommands.add(data.commandId);
            const entry = dinoMap.get(data.turtleId); // turtleId field name kept for compat
            if (entry) handleCommand(entry, data.command);
          }
        } catch {}
      };
      es.addEventListener('delete', (evt) => {
        try {
          const data = JSON.parse(evt.data);
          for (const id of (data.deleted || [])) {
            const entry = dinoMap.get(id);
            if (entry) {
              scene.remove(entry.group);
              if (entry.label) entry.label.remove();
              if (entry.material && entry.material.map) entry.material.map.dispose();
              dinoMap.delete(id);
            }
          }
        } catch {}
      });
    }

    // ===================================================================
    // ANIMATION LOOP
    // ===================================================================
    let lastFrame = 0;

    function animate(now) {
      requestAnimationFrame(animate);
      if (!lastFrame) { lastFrame = now; startTime = now / 1000; }
      let dt = (now - lastFrame) / 1000;
      if (dt > 0.1) dt = 0.1;
      lastFrame = now;
      const time = now / 1000 - startTime;

      for (const entry of dinoMap.values()) {
        updateDinoMovement(entry, dt, time);
      }
      updatePterodactyls(dt, time);

      updateLabels();
      updateTitle();

      renderer.render(scene, camera);
    }

    // ===================================================================
    // CODE ENTRY & STARTUP
    // ===================================================================
    async function validateCode(code) {
      try {
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(code)}&knownIds=`);
        return res.status;
      } catch { return 0; }
    }

    async function handleCodeSubmit() {
      const code = codeInput.value.trim();
      if (!code) return;
      codeError.textContent = '';
      codeSubmit.disabled = true;
      codeSubmit.textContent = '...';

      const status = await validateCode(code);
      if (status === 200) {
        eventCode = code;
        localStorage.setItem('dinoEventCode', code);
        overlay.style.display = 'none';
        startLandscape();
      } else if (status === 403) {
        codeError.textContent = 'Wrong code. Try again!';
      } else if (status === 429) {
        codeError.textContent = 'Too many attempts. Wait a moment.';
      } else {
        codeError.textContent = 'Connection error.';
      }
      codeSubmit.disabled = false;
      codeSubmit.textContent = 'Enter';
    }

    function startLandscape() {
      if (landscapeRunning) return;
      landscapeRunning = true;
      startTime = performance.now() / 1000;
      pollDinos();
      connectSSE();
      requestAnimationFrame(animate);
    }

    codeSubmit.addEventListener('click', handleCodeSubmit);
    codeInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleCodeSubmit(); });

    // Auto-enter if code saved
    const savedCode = localStorage.getItem('dinoEventCode');
    if (savedCode) {
      validateCode(savedCode).then(status => {
        if (status === 200) {
          eventCode = savedCode;
          overlay.style.display = 'none';
          startLandscape();
        }
      });
    }
  </script>
</body>
