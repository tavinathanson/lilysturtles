<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Remote — Dinosaurs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #5a3e1b 0%, #8B6914 50%, #a07a28 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }
    h1 {
      text-align: center;
      color: #5a3e1b;
      font-size: 24px;
      margin-bottom: 8px;
    }
    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      font-size: 14px;
    }
    input[type="text"], select {
      width: 100%;
      padding: 14px;
      border: 2px solid #ddd;
      border-radius: 12px;
      font-size: 16px;
      margin-bottom: 18px;
      -webkit-appearance: none;
      appearance: none;
      background: white;
    }
    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #8B6914;
    }
    button.primary {
      width: 100%;
      padding: 16px;
      background: #8B6914;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      min-height: 52px;
      transition: background 0.2s;
    }
    button.primary:active { background: #6d5210; }
    button.primary:disabled { background: #999; cursor: not-allowed; }
    .message {
      text-align: center;
      padding: 12px;
      border-radius: 10px;
      margin-top: 16px;
      font-size: 15px;
      display: none;
    }
    .message.error { display: block; background: #ffe0e0; color: #c00; }
    .control-panel { display: none; text-align: center; }
    .control-panel h2 {
      color: #5a3e1b;
      font-size: 22px;
      margin-bottom: 16px;
    }
    .dino-select-wrap {
      margin-bottom: 18px;
    }
    .action-btn {
      width: 100%;
      padding: 18px 16px;
      margin-bottom: 12px;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      min-height: 56px;
      transition: opacity 0.2s, transform 0.1s;
      color: white;
    }
    .action-btn:active:not(:disabled) { transform: scale(0.97); }
    .action-btn:disabled {
      background: #aaa !important;
      color: #ddd;
      cursor: not-allowed;
      transform: none !important;
    }
    .action-btn.closer  { background: #8B6914; }
    .action-btn.hat     { background: #d4609a; }
    .action-btn.spin    { background: #e08830; }
    .nav-link {
      display: block;
      text-align: center;
      margin-top: 18px;
      color: #8B6914;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
    }
    .nav-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Dino Remote</h1>
    <p class="subtitle">Control any dinosaur on the landscape!</p>

    <div id="codeForm">
      <label for="eventCode">Dino Code</label>
      <input type="text" id="eventCode" inputmode="numeric" pattern="\d*" placeholder="4-digit code" autocomplete="off">
      <button class="primary" id="connectBtn">Connect</button>
    </div>
    <div class="message" id="message"></div>

    <div class="control-panel" id="controlPanel">
      <div class="dino-select-wrap">
        <label for="dinoSelect">Choose a dinosaur</label>
        <select id="dinoSelect"></select>
      </div>
      <button class="action-btn closer" data-action="come_closer" data-cooldown="8">
        Come Closer
      </button>
      <button class="action-btn hat" data-action="party_hat" data-cooldown="5">
        Party Hat
      </button>
      <button class="action-btn spin" data-action="spin" data-cooldown="6">
        Do a Spin
      </button>
    </div>

    <a href="upload-dinos.html" class="nav-link">Upload a dinosaur instead</a>
  </div>

  <script>
    const msg = document.getElementById('message');
    const codeForm = document.getElementById('codeForm');
    const connectBtn = document.getElementById('connectBtn');
    const controlPanel = document.getElementById('controlPanel');
    const dinoSelect = document.getElementById('dinoSelect');
    const codeInput = document.getElementById('eventCode');

    let eventCode = '';
    let pollTimer = null;

    // Fetch title from config
    fetch('/api/config?mode=dinos').then(r => r.json()).then(cfg => {
      const t = cfg.title || 'Dinosaurs';
      document.title = 'Remote — ' + t;
      document.querySelector('h1').textContent = t + ' Remote';
    }).catch(() => {});

    // Restore saved code
    const stored = localStorage.getItem('dinoCode');
    if (stored) codeInput.value = stored;

    connectBtn.addEventListener('click', connect);
    codeInput.addEventListener('keydown', e => { if (e.key === 'Enter') connect(); });

    async function connect() {
      const code = codeInput.value.trim();
      if (!code) return;
      connectBtn.disabled = true;
      connectBtn.textContent = '...';
      msg.className = 'message'; msg.style.display = 'none';

      try {
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(code)}&knownIds=`);
        if (res.ok) {
          eventCode = code;
          localStorage.setItem('dinoCode', code);
          codeForm.style.display = 'none';
          controlPanel.style.display = 'block';
          refreshDinoList();
          pollTimer = setInterval(refreshDinoList, 5000);
        } else if (res.status === 403) {
          msg.className = 'message error'; msg.textContent = 'Wrong code.'; msg.style.display = 'block';
        } else if (res.status === 429) {
          msg.className = 'message error'; msg.textContent = 'Too many attempts. Wait a moment.'; msg.style.display = 'block';
        }
      } catch {
        msg.className = 'message error'; msg.textContent = 'Connection error.'; msg.style.display = 'block';
      }
      connectBtn.disabled = false;
      connectBtn.textContent = 'Connect';
    }

    async function refreshDinoList() {
      try {
        const res = await fetch(`/api/dinos?eventCode=${encodeURIComponent(eventCode)}&knownIds=`);
        if (!res.ok) return;
        const data = await res.json();
        const dinos = (data.dinos || []).filter(d => !d.isHero);
        const prev = dinoSelect.value;
        dinoSelect.innerHTML = '';
        if (dinos.length === 0) {
          dinoSelect.innerHTML = '<option value="">No dinosaurs yet</option>';
          return;
        }
        for (const d of dinos) {
          const opt = document.createElement('option');
          opt.value = d.id;
          opt.textContent = d.name || d.id;
          dinoSelect.appendChild(opt);
        }
        if (prev && [...dinoSelect.options].some(o => o.value === prev)) {
          dinoSelect.value = prev;
        }
      } catch {}
    }

    // Action buttons with cooldown (same pattern as upload page)
    for (const actionBtn of controlPanel.querySelectorAll('.action-btn')) {
      actionBtn.addEventListener('click', async () => {
        const dinoId = dinoSelect.value;
        if (actionBtn.disabled || !dinoId) return;
        const action = actionBtn.dataset.action;
        const cooldown = parseInt(actionBtn.dataset.cooldown, 10) * 1000;

        const allBtns = controlPanel.querySelectorAll('.action-btn');
        const savedLabels = new Map();
        allBtns.forEach(b => { savedLabels.set(b, b.textContent.trim()); b.disabled = true; });

        try {
          const res = await fetch(`/api/turtle/${dinoId}/command`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action, eventCode }),
          });
          if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            if (data.error === 'Not found.') {
              msg.className = 'message error';
              msg.textContent = 'That dinosaur is no longer on the landscape.';
              msg.style.display = 'block';
              refreshDinoList();
            }
          }
        } catch {
          msg.className = 'message error';
          msg.textContent = 'Connection error. Try again!';
          msg.style.display = 'block';
        }

        let remaining = cooldown / 1000;
        allBtns.forEach(b => b.textContent = `Wait ${remaining}s...`);
        const countdownId = setInterval(() => {
          remaining--;
          if (remaining > 0) allBtns.forEach(b => b.textContent = `Wait ${remaining}s...`);
        }, 1000);

        setTimeout(() => {
          clearInterval(countdownId);
          allBtns.forEach(b => { b.disabled = false; b.textContent = savedLabels.get(b); });
        }, cooldown);
      });
    }
  </script>
</body>
</html>
