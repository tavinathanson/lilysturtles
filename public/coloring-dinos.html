<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinosaur Coloring Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  .no-print {
    margin-bottom: 16px;
    text-align: center;
  }
  .no-print h1 { color: #5a3e1b; font-size: 28px; margin-bottom: 8px; }
  .no-print p { color: #555; font-size: 16px; margin-bottom: 16px; max-width: 480px; }
  .species-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .species-btns button {
    background: #8B6914;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
  }
  .species-btns button:hover { background: #6d5210; }
  .species-btns button.active { background: #4a7a2e; }
  .print-btn {
    background: #4a7a2e;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    margin-top: 12px;
  }
  .print-btn:hover { background: #3a6220; }

  .page {
    width: 8.5in;
    height: 11in;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.35in 0.35in;
    gap: 12px;
  }
  .page.hidden { display: none; }

  .page-title {
    font-size: 38px;
    font-weight: 900;
    color: #222;
    text-align: center;
  }

  .dino-svg {
    width: 100%;
    flex: 1;
    min-height: 0;
  }
  .dino-container {
    width: 100%;
    flex: 1;
    min-height: 0;
    position: relative;
    /* Light gray dot grid — shows through transparent PNG areas.
       Prints as subtle dots outside the dino, stays above the 200/255
       detection threshold so image processing ignores it. */
    background-image: radial-gradient(circle, #ccc 0.6px, transparent 0.6px);
    background-size: 7px 7px;
  }
  .dino-svg {
    width: 100%;
    height: 100%;
    position: relative;
    z-index: 1;
  }
  .dot-indicator {
    align-self: flex-end;
    margin-bottom: -8px;
  }

  .name-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .name-line span {
    font-size: 20px;
    color: #999;
    font-weight: 700;
    white-space: nowrap;
  }
  .name-line .line {
    display: inline-block;
    width: 260px;
    border-bottom: 2px solid #ccc;
  }

  @media print {
    @page { size: letter; margin: 0; }
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .page.hidden { display: none !important; }
    .page {
      box-shadow: none;
      width: 100%;
      height: 100vh;
      padding: 0.3in 0.35in;
    }
  }
</style>
</head>
<body>

<div class="no-print">
  <h1>Dinosaur Coloring Pages</h1>
  <p>Pick a dinosaur, print the page, color it in, then take a photo and upload it!</p>
  <div class="species-btns">
    <button onclick="showSpecies('trex')" id="btn-trex" class="active">T-Rex</button>
    <button onclick="showSpecies('triceratops')" id="btn-triceratops">Triceratops</button>
    <button onclick="showSpecies('brachiosaurus')" id="btn-brachiosaurus">Brachiosaurus</button>
  </div>
  <button class="print-btn" onclick="window.print()">Print Coloring Page</button>
</div>

<!-- T-Rex (1 dot) -->
<div class="page" id="page-trex">
  <div class="page-title">Color the T-Rex!</div>
  <div class="dot-indicator" id="dots-trex"></div>
  <div class="dino-container"><svg class="dino-svg" id="svg-trex"></svg></div>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<!-- Triceratops (2 dots) -->
<div class="page hidden" id="page-triceratops">
  <div class="page-title">Color the Triceratops!</div>
  <div class="dot-indicator" id="dots-triceratops"></div>
  <div class="dino-container"><svg class="dino-svg" id="svg-triceratops"></svg></div>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<!-- Brachiosaurus (3 dots) -->
<div class="page hidden" id="page-brachiosaurus">
  <div class="page-title">Color the Brachiosaurus!</div>
  <div class="dot-indicator" id="dots-brachiosaurus"></div>
  <div class="dino-container"><svg class="dino-svg" id="svg-brachiosaurus"></svg></div>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<script>
  // Dot counts for species detection (printed in upper-right corner)
  var DOTS = { trex: 1, triceratops: 2, brachiosaurus: 3 };


  // Fetch SVG paths from server and render into each page
  fetch('/api/dino-paths').then(function(r) { return r.json(); }).then(function(paths) {
    ['trex', 'triceratops', 'brachiosaurus'].forEach(function(species) {
      var info = paths[species];
      if (!info) return;
      var svgEl = document.getElementById('svg-' + species);
      if (!svgEl) return;
      svgEl.setAttribute('viewBox', '0 0 ' + info.width + ' ' + info.height);
      svgEl.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
      // White fill inside the outline (for coloring)
      var fillPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      fillPath.setAttribute('d', info.path);
      fillPath.setAttribute('fill', 'white');
      fillPath.setAttribute('stroke', 'none');
      svgEl.appendChild(fillPath);
      // Black outline on top
      var strokePath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      strokePath.setAttribute('d', info.path);
      strokePath.setAttribute('fill', 'none');
      strokePath.setAttribute('stroke', '#000');
      strokePath.setAttribute('stroke-width', '3');
      svgEl.appendChild(strokePath);
    });
  });

  // Render dot indicators on each page
  ['trex', 'triceratops', 'brachiosaurus'].forEach(function(species) {
    var dotEl = document.getElementById('dots-' + species);
    if (!dotEl) return;
    var count = DOTS[species];
    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', count * 30 + 20);
    svg.setAttribute('height', 40);
    svg.setAttribute('viewBox', '0 0 ' + (count * 30 + 20) + ' 40');
    var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
    rect.setAttribute('x', 2); rect.setAttribute('y', 2);
    rect.setAttribute('width', count * 30 + 16); rect.setAttribute('height', 36);
    rect.setAttribute('rx', 6); rect.setAttribute('fill', 'none');
    rect.setAttribute('stroke', '#000'); rect.setAttribute('stroke-width', 2);
    svg.appendChild(rect);
    for (var i = 0; i < count; i++) {
      var circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      circle.setAttribute('cx', 18 + i * 30); circle.setAttribute('cy', 20);
      circle.setAttribute('r', 8); circle.setAttribute('fill', '#000');
      svg.appendChild(circle);
    }
    dotEl.appendChild(svg);
  });


  // ---- Species selector ----
  function showSpecies(species) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.add('hidden'); });
    document.getElementById('page-' + species).classList.remove('hidden');
    document.querySelectorAll('.species-btns button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + species).classList.add('active');
  }
</script>

</body>
</html>
