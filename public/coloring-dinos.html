<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinosaur Coloring Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  .no-print {
    margin-bottom: 16px;
    text-align: center;
  }
  .no-print h1 { color: #5a3e1b; font-size: 28px; margin-bottom: 8px; }
  .no-print p { color: #555; font-size: 16px; margin-bottom: 16px; max-width: 480px; }
  .species-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .species-btns button {
    background: #8B6914;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
  }
  .species-btns button:hover { background: #6d5210; }
  .species-btns button.active { background: #4a7a2e; }
  .print-btn {
    background: #4a7a2e;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    margin-top: 12px;
  }
  .print-btn:hover { background: #3a6220; }

  .page {
    width: 8.5in;
    height: 11in;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.35in 0.35in;
    gap: 12px;
  }
  .page.hidden { display: none; }

  .page-title {
    font-size: 38px;
    font-weight: 900;
    color: #222;
    text-align: center;
  }

  .dino-svg {
    width: 100%;
    flex: 1;
    min-height: 0;
  }

  .name-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .name-line span {
    font-size: 20px;
    color: #999;
    font-weight: 700;
    white-space: nowrap;
  }
  .name-line .line {
    display: inline-block;
    width: 260px;
    border-bottom: 2px solid #ccc;
  }

  @media print {
    @page { size: letter; margin: 0; }
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .page.hidden { display: none !important; }
    .page {
      box-shadow: none;
      width: 100%;
      height: 100vh;
      padding: 0.3in 0.35in;
    }
  }
</style>
</head>
<body>

<div class="no-print">
  <h1>Dinosaur Coloring Pages</h1>
  <p>Pick a dinosaur, print the page, color it in, then take a photo and upload it!</p>
  <div class="species-btns">
    <button onclick="showSpecies('trex')" id="btn-trex" class="active">T-Rex</button>
    <button onclick="showSpecies('triceratops')" id="btn-triceratops">Triceratops</button>
    <button onclick="showSpecies('stegosaurus')" id="btn-stegosaurus">Stegosaurus</button>
    <button onclick="showSpecies('brachiosaurus')" id="btn-brachiosaurus">Brachiosaurus</button>
  </div>
  <button class="print-btn" onclick="window.print()">Print Coloring Page</button>
</div>

<!-- T-Rex (1 dot) -->

    <!-- Eye -->
    <circle cx="490" cy="112" r="10" fill="white" stroke="#000" stroke-width="3"/>

    <!-- Teeth hints on jaw -->
    <path d="M505 155 L510 162 L515 155 L520 162 L525 155" fill="none" stroke="#000" stroke-width="2.5"/>

    <!-- Tiny arm -->
    <path d="M390 260 Q 400 270 395 280 L 388 278 M395 280 L 400 285" fill="none" stroke="#000" stroke-width="4" stroke-linecap="round"/>
  </svg>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<script>
  function showSpecies(species) {
    document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
    document.getElementById('page-' + species).classList.remove('hidden');
    document.querySelectorAll('.species-btns button').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + species).classList.add('active');
  }
</script>

</body>
</html>
