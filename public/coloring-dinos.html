<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dinosaur Coloring Pages</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Nunito', sans-serif;
    background: #e8e8e8;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    min-height: 100vh;
  }
  .no-print {
    margin-bottom: 16px;
    text-align: center;
  }
  .no-print h1 { color: #5a3e1b; font-size: 28px; margin-bottom: 8px; }
  .no-print p { color: #555; font-size: 16px; margin-bottom: 16px; max-width: 480px; }
  .species-btns {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin-bottom: 16px;
  }
  .species-btns button {
    background: #8B6914;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 15px;
    cursor: pointer;
  }
  .species-btns button:hover { background: #6d5210; }
  .species-btns button.active { background: #4a7a2e; }
  .print-btn {
    background: #4a7a2e;
    color: white;
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-family: 'Nunito', sans-serif;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    margin-top: 12px;
  }
  .print-btn:hover { background: #3a6220; }

  .page {
    width: 8.5in;
    height: 11in;
    background: white;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.35in 0.35in;
    gap: 12px;
  }
  .page.hidden { display: none; }

  .page-title {
    font-size: 38px;
    font-weight: 900;
    color: #222;
    text-align: center;
  }

  .dino-svg {
    width: 100%;
    flex: 1;
    min-height: 0;
  }

  .name-line {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .name-line span {
    font-size: 20px;
    color: #999;
    font-weight: 700;
    white-space: nowrap;
  }
  .name-line .line {
    display: inline-block;
    width: 260px;
    border-bottom: 2px solid #ccc;
  }

  @media print {
    @page { size: letter; margin: 0; }
    body { background: white; padding: 0; }
    .no-print { display: none !important; }
    .page.hidden { display: none !important; }
    .page {
      box-shadow: none;
      width: 100%;
      height: 100vh;
      padding: 0.3in 0.35in;
    }
  }
</style>
</head>
<body>

<div class="no-print">
  <h1>Dinosaur Coloring Pages</h1>
  <p>Pick a dinosaur, print the page, color it in, then take a photo and upload it!</p>
  <div class="species-btns">
    <button onclick="showSpecies('trex')" id="btn-trex" class="active">T-Rex</button>
    <button onclick="showSpecies('triceratops')" id="btn-triceratops">Triceratops</button>
    <button onclick="showSpecies('stegosaurus')" id="btn-stegosaurus">Stegosaurus</button>
    <button onclick="showSpecies('brachiosaurus')" id="btn-brachiosaurus">Brachiosaurus</button>
  </div>
  <button class="print-btn" onclick="window.print()">Print Coloring Page</button>
</div>

<!-- T-Rex (1 dot) -->
<div class="page" id="page-trex">
  <div class="page-title">Color the T-Rex!</div>
  <svg class="dino-svg" id="svg-trex" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<!-- Triceratops (2 dots) -->
<div class="page hidden" id="page-triceratops">
  <div class="page-title">Color the Triceratops!</div>
  <svg class="dino-svg" id="svg-triceratops" viewBox="0 0 680 620" xmlns="http://www.w3.org/2000/svg"></svg>
  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<!-- Stegosaurus (3 dots) -->

  <div class="name-line">
    <span>Dinosaur's name:</span>
    <span class="line">&nbsp;</span>
  </div>
</div>

<!-- Brachiosaurus (4 dots) -->
<div class="page hidden" id="page-brachiosaurus">
  <div class="page-title">Color the Brachiosaurus!</div>

<script>
  // ---- ShapeRecorder: lightweight adapter replacing THREE.Shape ----
  class ShapeRecorder {
    constructor() { this.cmds = []; }
    moveTo(x, y) { this.cmds.push('M ' + x + ' ' + y); }
    lineTo(x, y) { this.cmds.push('L ' + x + ' ' + y); }
    quadraticCurveTo(cx, cy, x, y) { this.cmds.push('Q ' + cx + ' ' + cy + ' ' + x + ' ' + y); }
    bezierCurveTo(c1x, c1y, c2x, c2y, x, y) { this.cmds.push('C ' + c1x + ' ' + c1y + ' ' + c2x + ' ' + c2y + ' ' + x + ' ' + y); }
    closePath() { this.cmds.push('Z'); }
    toSVGPath() { return this.cmds.join(' '); }
  }

    const s = new ShapeRecorder();
    s.moveTo(-0.18, 0);
    s.bezierCurveTo(-0.22, -0.2, -0.24, -0.45, -0.22, -0.7);
    s.bezierCurveTo(-0.2, -0.95, -0.18, -1.15, -0.17, -1.35);
    s.bezierCurveTo(-0.16, -1.5, -0.17, -1.62, -0.2, -1.72);
    s.quadraticCurveTo(-0.22, -1.78, -0.24, -1.82);
    s.bezierCurveTo(-0.24, -1.88, -0.18, -1.9, -0.08, -1.9);
    s.quadraticCurveTo(0.0, -1.9, 0.08, -1.9);
    s.bezierCurveTo(0.14, -1.88, 0.16, -1.84, 0.14, -1.78);
    s.quadraticCurveTo(0.12, -1.72, 0.1, -1.62);
    s.bezierCurveTo(0.11, -1.45, 0.13, -1.25, 0.15, -1.05);
    s.bezierCurveTo(0.17, -0.8, 0.19, -0.55, 0.2, -0.35);
    s.bezierCurveTo(0.2, -0.2, 0.19, -0.08, 0.18, 0);
    s.closePath();
    return s;
  }

  // ---- Dino configs (hip positions from live-dinos.html) ----
  const DINO_CONFIGS = {
    trex: {
      bodyFn: makeTrexBody,
      legFn: makeTrexLeg,
      hipLeft: { x: -0.3, y: 0 },
      hipRight: { x: 0.6, y: 0 },
      legLength: 2.25,
      dots: 1,
      label: 'T-Rex'
    },
    triceratops: {
      bodyFn: makeTriceratopsBody,
      legFn: makeTriceratopsLeg,
      hipLeft: { x: -0.1, y: 0 },
      hipRight: { x: 0.8, y: 0 },
      legLength: 1.6,
      dots: 2,
      label: 'Triceratops'
    },
    stegosaurus: {
      bodyFn: makeStegosaurusBody,
      legFn: makeStegosaurusLeg,
      hipLeft: { x: -0.1, y: 0 },
      hipRight: { x: 1.0, y: 0 },
      legLength: 1.4,
      dots: 3,
      label: 'Stegosaurus'
    },
    brachiosaurus: {
      bodyFn: makeBrachiosaurusBody,
      legFn: makeBrachiosaurusLeg,
      hipLeft: { x: -0.1, y: 0 },
      hipRight: { x: 0.8, y: 0 },
      legLength: 1.9,
      dots: 4,
      label: 'Brachiosaurus'
    }
  };

  // ---- Flip Y in an SVG path string (negate all Y values) ----
  function flipYPath(pathStr) {
    // Parse the SVG path and negate every Y coordinate
    // Commands: M x y, L x y, Q cx cy x y, C c1x c1y c2x c2y x y, Z
    return pathStr.replace(/([MLQCZ])\s*([^MLQCZ]*)/gi, function(match, cmd, args) {
      if (cmd === 'Z') return 'Z';
      var nums = args.trim().split(/\s+/).map(Number);
      // Negate every odd-indexed number (Y values: index 1, 3, 5, ...)
      for (var i = 1; i < nums.length; i += 2) {
        nums[i] = -nums[i];
      }
      return cmd + ' ' + nums.join(' ');
    });
  }

  // ---- Translate an SVG path string by (dx, dy) ----
  function translatePath(pathStr, dx, dy) {
    return pathStr.replace(/([MLQCZ])\s*([^MLQCZ]*)/gi, function(match, cmd, args) {
      if (cmd === 'Z') return 'Z';
      var nums = args.trim().split(/\s+/).map(Number);
      for (var i = 0; i < nums.length; i += 2) {
        nums[i] += dx;
        if (i + 1 < nums.length) nums[i + 1] += dy;
      }
      return cmd + ' ' + nums.join(' ');
    });
  }

  // ---- Compute bounding box of an SVG path string ----
  function pathBounds(pathStr) {
    var nums = [];
    pathStr.replace(/([MLQCZ])\s*([^MLQCZ]*)/gi, function(match, cmd, args) {
      if (cmd === 'Z') return;
      var n = args.trim().split(/\s+/).map(Number);
      for (var i = 0; i < n.length; i += 2) {
        nums.push({ x: n[i], y: n[i + 1] });
      }
    });
    var minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    nums.forEach(function(p) {
      if (p.x < minX) minX = p.x;
      if (p.y < minY) minY = p.y;
      if (p.x > maxX) maxX = p.x;
      if (p.y > maxY) maxY = p.y;
    });
    return { minX: minX, minY: minY, maxX: maxX, maxY: maxY, w: maxX - minX, h: maxY - minY };
  }

  // ---- Scale an SVG path string by a factor around origin ----
  function scalePath(pathStr, sx, sy) {
    return pathStr.replace(/([MLQCZ])\s*([^MLQCZ]*)/gi, function(match, cmd, args) {
      if (cmd === 'Z') return 'Z';
      var nums = args.trim().split(/\s+/).map(Number);
      for (var i = 0; i < nums.length; i += 2) {
        nums[i] *= sx;
        if (i + 1 < nums.length) nums[i + 1] *= sy;
      }
      return cmd + ' ' + nums.join(' ');
    });
  }

  // ---- SVG namespace helper ----
  var SVG_NS = 'http://www.w3.org/2000/svg';

  function svgEl(tag, attrs) {
    var el = document.createElementNS(SVG_NS, tag);
    for (var k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }

  // ---- Render a dino into its SVG ----
  function renderDino(species) {
    var cfg = DINO_CONFIGS[species];
    var svg = document.getElementById('svg-' + species);
    var viewW = 680, viewH = 620;
    var margin = 50;

    // Generate raw paths (Three.js coordinate system: Y up)
    var bodyShape = cfg.bodyFn();
    var legShape = cfg.legFn();

    var bodyRaw = bodyShape.toSVGPath();
    var legRaw = legShape.toSVGPath();

    // Flip Y (Three.js Y-up -> SVG Y-down)
    var bodyFlipped = flipYPath(bodyRaw);
    // Legs are positioned relative to hip, which is at (hipX, 0) on the body.
    // In Three.js, legs hang downward from hip (negative Y).
    // After flipping Y, leg coordinates become positive (going down).
    var legFlipped = flipYPath(legRaw);

    // Position legs at their hip positions (the hip Y is 0, so after flip it's still 0)
    var leftLegPath = translatePath(legFlipped, cfg.hipLeft.x, -cfg.hipLeft.y);
    var rightLegPath = translatePath(legFlipped, cfg.hipRight.x, -cfg.hipRight.y);

    // Compute overall bounding box of all parts combined
    var allPaths = [bodyFlipped, leftLegPath, rightLegPath];
    var totalBounds = { minX: Infinity, minY: Infinity, maxX: -Infinity, maxY: -Infinity };
    allPaths.forEach(function(p) {
      var b = pathBounds(p);
      if (b.minX < totalBounds.minX) totalBounds.minX = b.minX;
      if (b.minY < totalBounds.minY) totalBounds.minY = b.minY;
      if (b.maxX > totalBounds.maxX) totalBounds.maxX = b.maxX;
      if (b.maxY > totalBounds.maxY) totalBounds.maxY = b.maxY;
    });

    var rawW = totalBounds.maxX - totalBounds.minX;
    var rawH = totalBounds.maxY - totalBounds.minY;

    // Scale to fit in viewBox with margin
    var availW = viewW - margin * 2;
    var availH = viewH - margin * 2;
    var scale = Math.min(availW / rawW, availH / rawH);

    // After scaling, center in viewBox
    var scaledW = rawW * scale;
    var scaledH = rawH * scale;
    var offsetX = margin + (availW - scaledW) / 2 - totalBounds.minX * scale;
    var offsetY = margin + (availH - scaledH) / 2 - totalBounds.minY * scale;

    // Transform each path: scale then translate
    function transformPath(p) {
      var scaled = scalePath(p, scale, scale);
      return translatePath(scaled, offsetX, offsetY);
    }

    var strokeW = Math.max(2, Math.min(6, scale * 0.04));

    // Common path attributes
    var pathAttrs = {
      fill: 'none',
      stroke: '#000',
      'stroke-width': strokeW,
      'stroke-linejoin': 'round',
      'stroke-linecap': 'round'
    };

    // Draw legs first (behind body)
    svg.appendChild(svgEl('path', Object.assign({ d: transformPath(leftLegPath) }, pathAttrs)));
    svg.appendChild(svgEl('path', Object.assign({ d: transformPath(rightLegPath) }, pathAttrs)));

    // Draw body on top
    svg.appendChild(svgEl('path', Object.assign({ d: transformPath(bodyFlipped) }, pathAttrs)));

    // Draw dot indicator
    var dots = cfg.dots;
    var dotR = 10;
    var dotSpacing = 30;
    var rectW = dots * dotSpacing + 20;
    var rectX = viewW - rectW - 10;
    svg.appendChild(svgEl('rect', {
      x: rectX, y: 10, width: rectW, height: 40, rx: 6,
      fill: 'none', stroke: '#000', 'stroke-width': 2
    }));
    for (var i = 0; i < dots; i++) {
      svg.appendChild(svgEl('circle', {
        cx: rectX + 20 + i * dotSpacing, cy: 30, r: dotR, fill: '#000'
      }));
    }
  }

  // ---- Render all dinos ----
  ['trex', 'triceratops', 'stegosaurus', 'brachiosaurus'].forEach(renderDino);

  // ---- Species selector ----
  function showSpecies(species) {
    document.querySelectorAll('.page').forEach(function(p) { p.classList.add('hidden'); });
    document.getElementById('page-' + species).classList.remove('hidden');
    document.querySelectorAll('.species-btns button').forEach(function(b) { b.classList.remove('active'); });
    document.getElementById('btn-' + species).classList.add('active');
  }
</script>
